<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSWE Exploit Builder Library</title>
  <style>
    :root {
      --bg: #f5f2ea;
      --surface: #fffefa;
      --surface-2: #fbfaf5;
      --ink: #20231f;
      --muted: #687069;
      --line: #d8d1c3;
      --accent: #0f766e;
      --blue: #174ea6;
      --red: #b42318;
      --amber: #8a5a00;
      --violet: #6842b8;
      --green: #59621f;
      --code: #202621;
      --code-ink: #edf2ec;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    main {
      max-width: 1420px;
      margin: 0 auto;
      padding: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 21px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      margin-top: 0;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 14px;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      padding: 10px 11px;
      color: var(--ink);
      margin-bottom: 12px;
    }

    .filters {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .filter[aria-pressed="true"] {
      border-color: rgba(15, 118, 110, .5);
      background: #e3f1ed;
      color: #063b36;
    }

    .script-list {
      display: grid;
      gap: 7px;
    }

    .category-heading {
      margin: 11px 0 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .category-heading:first-child {
      margin-top: 0;
    }

    .script-button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--ink);
      text-align: left;
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .script-button[aria-pressed="true"] {
      border-color: rgba(15, 118, 110, .55);
      background: #e3f1ed;
    }

    .button-title {
      font-weight: 850;
      font-size: 13px;
    }

    .button-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .source-meta {
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
    }

    .content {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
      min-width: 0;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }

    .meta-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin: 10px 0 0;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .type-start { background: var(--blue); }
    .type-replace { background: var(--red); }
    .type-add { background: var(--accent); }
    .type-example { background: var(--green); }
    .area-main { background: var(--blue); }
    .area-login { background: var(--amber); }
    .area-exploit { background: var(--red); }
    .area-listener { background: var(--violet); }
    .area-helper { background: var(--accent); }
    .area-example { background: var(--green); }
    .source-pill { background: #334155; }

    .actions {
      display: flex;
      gap: 8px;
      align-items: start;
      flex-wrap: wrap;
      justify-content: end;
    }

    .action {
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: #063b36;
      background: #e3f1ed;
      padding: 9px 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .secondary {
      border-color: var(--line);
      background: var(--surface);
      color: var(--ink);
    }

    pre {
      margin: 0;
      padding: 16px;
      overflow: auto;
      background: var(--code);
      color: var(--code-ink);
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: calc(100vh - 150px);
      max-height: 720px;
    }

    .empty {
      display: none;
      color: var(--muted);
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      font-size: 14px;
    }

    @media (max-width: 1040px) {
      .workspace { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
    }

    @media (max-width: 660px) {
      main { padding: 20px 14px 32px; }
      .panel-head { grid-template-columns: 1fr; }
      .actions { justify-content: start; }
      pre { max-height: none; }
    }
  </style>
</head>
<body>
  <main>

    <section class="workspace">
      <aside class="sidebar" aria-label="Script library controls">
        <input class="search" type="search" placeholder="Search scripts, areas, techniques..." aria-label="Search scripts">
        <div class="filters" aria-label="Script category filters">
          <button class="filter" data-filter="all" aria-pressed="true">All</button>
          <button class="filter" data-filter="Start" aria-pressed="false">Start</button>
          <button class="filter" data-filter="Authentication" aria-pressed="false">Auth</button>
          <button class="filter" data-filter="SQL Injection" aria-pressed="false">SQLi</button>
          <button class="filter" data-filter="NoSQL / LDAP / XPath" aria-pressed="false">NoSQL</button>
          <button class="filter" data-filter="XSS / CSRF / CORS" aria-pressed="false">XSS</button>
          <button class="filter" data-filter="SSRF / OOB / Listener" aria-pressed="false">SSRF/OOB</button>
          <button class="filter" data-filter="Upload / Webshell" aria-pressed="false">Upload</button>
          <button class="filter" data-filter="Deserialization" aria-pressed="false">Deser</button>
          <button class="filter" data-filter="Second-Order / WebSocket" aria-pressed="false">2nd/WS</button>
          <button class="filter" data-filter="Logic / Race / Timing" aria-pressed="false">Logic</button>
          <button class="filter" data-filter="Helpers" aria-pressed="false">Helpers</button>
          <button class="filter" data-filter="Examples" aria-pressed="false">Examples</button>
        </div>
        <div class="script-list" aria-label="Scripts"></div>
        <div class="empty">No scripts match this filter.</div>
      </aside>

      <div class="content">

        <article class="panel" id="script-panel">
          <div class="panel-head">
            <div>
              <h2 id="script-title"></h2>
              <p id="script-summary"></p>
              <div class="meta-row">
                <span id="script-type" class="pill"></span>
                <span id="script-area" class="pill"></span>
                <span id="script-slot" class="pill area-helper"></span>
                <span id="script-source" class="pill source-pill"></span>
              </div>
            </div>
            <div class="actions">
              <button class="action" id="copy-active" type="button">Copy code</button>
              <button class="action secondary" id="download-active" type="button">Download</button>
            </div>
          </div>
          <pre><code id="script-code"></code></pre>
        </article>
      </div>
    </section>
  </main>

            "code": "#!/usr/bin/env python3\nfrom http import server\nfrom urllib.parse import urlparse, parse_qs\nimport base64\nimport json\nimport ssl\n\nHOST = \"0.0.0.0\"      # EDIT\nPORT = 4443           # EDIT\nCERT = \"server.pem\"   # EDIT\nPARAM = \"r\"           # EDIT\n\nclass Handler(server.SimpleHTTPRequestHandler):\n    def do_GET(self):\n        query = parse_qs(urlparse(self.path).query)\n        if PARAM in query:\n            try:\n                decoded = base64.b64decode(query[PARAM][0] + \"===\").decode(errors=\"replace\")\n                try:\n                    print(json.dumps(json.loads(decoded), indent=2))\n                except json.JSONDecodeError:\n                    print(decoded)\n            except Exception as exc:\n                print(f\"[-] decode failed: {exc}\")\n        self.send_response(200)\n        self.end_headers()\n        self.wfile.write(b\"ok\")\n\nhttpd = server.HTTPServer((HOST, PORT), Handler)\nctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\nctx.load_cert_chain(CERT)\nhttpd.socket = ctx.wrap_socket(httpd.socket, server_side=True)\nprint(f\"[+] listening on https://{HOST}:{PORT}\")\nhttpd.serve_forever()\n"

    function activate(id) {
      activeScript = scripts.find((script) => script.id === id) || scripts[0];
      title.textContent = activeScript.title;
      summary.textContent = activeScript.summary;
      type.textContent = activeScript.type;
      type.className = `pill ${typeClasses[activeScript.type]}`;
      area.textContent = categoryFor(activeScript);
      area.className = `pill ${areaClasses[activeScript.area] || "area-exploit"}`;
      slot.textContent = activeScript.slot;
      source.textContent = sourceTags[activeScript.id] || "";
      source.style.display = source.textContent ? "inline-flex" : "none";
      code.textContent = activeScript.code.trim();
      renderList();
    }

    filters.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filters.forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });
        renderList();
      });
    });

    search.addEventListener("input", renderList);

    copy.addEventListener("click", async () => {
      await navigator.clipboard.writeText(activeScript.code.trim());
      copy.textContent = "Copied";
      setTimeout(() => copy.textContent = "Copy code", 900);
    });

    download.addEventListener("click", () => {
      const blob = new Blob([activeScript.code.trim() + "\n"], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = activeScript.filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });

    activate(activeScript.id);
  </script>
</body>
</html>
