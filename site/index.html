<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSWE Exploit.py Builder</title>
  <style>
    :root{
      --bg:#f5f7f8;
      --paper:#ffffff;
      --ink:#172126;
      --muted:#61717a;
      --line:#d8e0e5;
      --line-strong:#aebbc4;
      --accent:#0f766e;
      --accent-2:#2563eb;
      --warn:#a16207;
      --bad:#b91c1c;
      --good:#047857;
      --code-bg:#101820;
      --code-ink:#dce8ee;
      --edit-bg:#3a2b12;
      --radius:8px;
      --shadow:0 18px 45px rgba(23,33,38,.08);
      --mono:"Cascadia Mono","SFMono-Regular",Consolas,"Liberation Mono",monospace;
      --sans:Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;overflow-x:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.38}
    button,input,select{font:inherit}
    button,select{border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);border-radius:6px;padding:7px 9px;cursor:pointer}
    button:hover{border-color:var(--accent);color:var(--accent)}
    button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px}
    .primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .primary:hover{background:#0b5d56;color:#fff}
    .app{display:grid;grid-template-columns:minmax(300px,390px) minmax(360px,1fr) minmax(340px,470px);gap:12px;min-height:100vh;padding:12px}
    header{grid-column:1/-1;display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);box-shadow:var(--shadow);padding:10px 12px}
    h1{font-size:18px;line-height:1.1;margin:0;font-weight:760;letter-spacing:0}
    .status-line{font-size:12px;color:var(--muted)}
    .top-spacer{flex:1}
    .search{min-width:260px;max-width:520px;width:34vw;border:1px solid var(--line-strong);border-radius:6px;background:#fbfcfd;color:var(--ink);padding:8px 10px}
    .panel{min-width:0;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .panel-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
    .panel-head h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin:0}
    .badge{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:999px;background:#fbfcfd;color:var(--muted);font-size:11px;padding:2px 7px;white-space:nowrap}
    .badge.warn{border-color:#f3c078;background:#fff7ed;color:var(--warn)}
    .badge.bad{border-color:#fecaca;background:#fef2f2;color:var(--bad)}
    .badge.good{border-color:#98d9c2;background:#ecfdf5;color:var(--good)}
    .controls{display:grid;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:#fbfcfd}
    .category-grid{display:flex;gap:6px;flex-wrap:wrap}
    .tab{font-size:12px;padding:6px 8px}
    .tab[aria-selected="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
    .list{overflow:auto;max-height:calc(100vh - 205px)}
    .piece-row{display:block;width:100%;border:0;border-bottom:1px solid var(--line);border-radius:0;text-align:left;padding:10px 12px;background:#fff}
    .piece-row:hover,.piece-row[aria-selected="true"]{background:#f2faf8}
    .piece-title{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:730;min-width:0}
    .piece-row small{display:block;color:var(--muted);font-size:12px;margin-top:3px}
    .meta{display:grid;gap:8px;padding:12px;border-bottom:1px solid var(--line)}
    .meta h3{margin:0;font-size:19px;line-height:1.16}
    .meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .meta-box{border:1px solid var(--line);border-radius:6px;background:#fbfcfd;padding:8px;min-width:0}
    .meta-box b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:3px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--line);background:#fff}
    .hint{color:var(--muted);font-size:12px}
    .code-toggle{border-top:1px solid var(--line);background:#fbfcfd}
    .code-toggle summary{list-style:none;cursor:pointer;padding:10px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;font-weight:730;display:flex;align-items:center;justify-content:space-between}
    .code-toggle summary::-webkit-details-marker{display:none}
    .code-toggle summary::after{content:"abrir";font-weight:500;letter-spacing:0;text-transform:none;color:var(--muted)}
    .code-toggle[open] summary::after{content:"fechar"}
    .code-wrap{background:var(--code-bg)}
    pre{margin:0;white-space:pre;overflow:auto;tab-size:4;font-family:var(--mono);font-size:12.2px;line-height:1.48}
    .code-wrap pre{padding:14px;color:var(--code-ink);max-height:calc(100vh - 350px)}
    .builder-body{overflow:auto;max-height:calc(100vh - 190px)}
    .chain{display:grid;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:#fbfcfd}
    .step{display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:6px;background:#fff;padding:8px}
    .step-num{font-family:var(--mono);font-weight:750;color:var(--accent)}
    .step input{width:100%;border:1px solid var(--line-strong);border-radius:5px;padding:6px 7px;font-family:var(--mono);font-size:12px}
    .step-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
    .step-actions button{padding:5px 7px;font-size:12px}
    .empty{border:1px dashed var(--line-strong);border-radius:6px;background:#fff;padding:10px;color:var(--muted);font-size:12px}
    .warning{margin:10px 12px;border:1px solid #f3c078;background:#fff7ed;color:var(--warn);border-radius:6px;padding:8px;font-size:12px}
    .draft-code{background:var(--code-bg);color:var(--code-ink);padding:14px;max-height:calc(100vh - 385px)}
    .py-cmt{color:#7fa086}.py-kw{color:#8da8ff;font-weight:700}.py-bi{color:#7dd3fc}.py-fn{color:#9fe3b1}
    .edit{display:block;background:var(--edit-bg);margin:0 -14px;padding:0 14px;border-left:3px solid #f59e0b}
    .fallback{padding:16px}
    .fallback article{border:1px solid var(--line);border-radius:6px;background:#fff;margin:10px 0}
    .fallback h2,.fallback p{margin:10px}
    #copy-buf{position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:.01}
    @media (max-width:1180px){
      .app{grid-template-columns:minmax(300px,390px) minmax(360px,1fr)}
      .builder-panel{grid-column:1/-1}
      .builder-body{max-height:none}
      .draft-code{max-height:460px}
    }
    @media (max-width:760px){
      .app{display:flex;flex-direction:column;padding:8px}
      header{position:sticky;top:0;z-index:20;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
      .top-spacer{display:none}
      .builder-panel{order:1}
      section.panel{order:2}
      main.panel{order:3}
      .search{width:100%;max-width:none;min-width:0}
      .category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
      .tab{width:100%;font-size:11px;padding:6px 5px;white-space:normal}
      .piece-title{align-items:flex-start;justify-content:flex-start;flex-wrap:wrap}
      .panel{margin-bottom:8px}
      .list,.builder-body,.code-wrap pre,.draft-code{max-height:none}
      .meta-grid{grid-template-columns:1fr}
      .step{grid-template-columns:24px 1fr}
      .step-actions{grid-column:1/-1;justify-content:flex-start}
    }
  </style>
</head>

</div>

import argparse
import base64

import json

from urllib.parse import quote, urljoin

import requests

TARGET = ""                      # set by --target
LHOST = None                     # set by --lhost when callback/reverse shell is needed
LPORT = None                     # set by --lport when callback/reverse shell is needed
USERNAME = "user"                # EDIT default, override with --username
PASSWORD = "pass"                # EDIT default, override with --password
PROXY = None                     # off by default; set only via --proxy
DEBUG = False                    # set by --debug
VERIFY_TLS = False               # override with --verify-tls
TIMEOUT = 12                     # override with --timeout

s = requests.Session()
s.verify = VERIFY_TLS

def url(path):
    return urljoin(TARGET.rstrip("/") + "/", path.lstrip("/"))

def die(msg):
    print(f"[-] {msg}")
    sys.exit(1)

def check(cond, msg):
    if not cond:

def dprint(*args, **kwargs):
    if DEBUG:
        print("[debug]", *args, **kwargs)

def parse_args():
    global TARGET, LHOST, LPORT, USERNAME, PASSWORD, PROXY, DEBUG, VERIFY_TLS, TIMEOUT
    p = argparse.ArgumentParser(description="OSWE proof-of-concept exploit")
    p.add_argument("-t", "--target", required=True, help="target base URL, e.g. http://192.168.120.10")
    p.add_argument("--lhost", help="attacker IP/host for callbacks, webserver, or reverse shell")
    p.add_argument("--lport", type=int, help="attacker port for callbacks, webserver, or reverse shell")
    p.add_argument("-u", "--username", default=USERNAME)
    p.add_argument("-p", "--password", default=PASSWORD)
    p.add_argument("--proxy", help="optional proxy URL, e.g. http://127.0.0.1:8080")
    p.add_argument("--debug", action="store_true", help="print extra request/response details")
    p.add_argument("--verify-tls", action="store_true")
    p.add_argument("--timeout", type=int, default=TIMEOUT)
    args = p.parse_args()
    TARGET = args.target.rstrip("/")
    LHOST = args.lhost
    LPORT = args.lport
    USERNAME = args.username
    PASSWORD = args.password
    PROXY = args.proxy
    DEBUG = args.debug
    VERIFY_TLS = args.verify_tls
    TIMEOUT = args.timeout
    s.verify = VERIFY_TLS
    s.proxies.clear()
    if PROXY:
        s.proxies.update({"http": PROXY, "https": PROXY})
        dprint("proxy enabled:", PROXY)
    return args

def require_callback():
    check(LHOST and LPORT, "this chain needs --lhost and --lport")

def callback_url(path="", scheme="http"):
    require_callback()
    return f"{scheme}://{LHOST}:{LPORT}/{path.lstrip('/')}"

  {

    defaultFunction:"conditional_get_extract",

    code:String.raw`def conditional_get_extract():
    # Use when: GET page/API returns data and you need extract only if conditions match.
    # Examples: admin appears 2x, response has admin + Public Discussion, hit contains admin.
    PATH = "/api/items"                       # EDIT
    PARAMS = {}                               # EDIT query params
    HEADERS = {}                              # EDIT
    COOKIES = {}                              # EDIT
    EXPECT_STATUS = (200,)                    # EDIT
    FOLLOW_REDIRECTS = True                   # EDIT

    CONTAINS_ALL = []                         # EDIT e.g. ["admin", "Public Discussion"]
    CONTAINS_ANY = []                         # EDIT e.g. ["role", "username"]
    CONTAINS_NONE = []                        # EDIT e.g. ["disabled"]
    MIN_COUNTS = {"admin": 2}                 # EDIT e.g. {"admin": 2}; {} to disable

    EXTRACT_REGEX = r'"username"\s*:\s*"([^"]+)"'  # EDIT capture what you want from body
    HIT_CONTAINS_ALL = []                     # EDIT filters each extracted hit
    HIT_CONTAINS_ANY = []                     # EDIT
    UNIQUE = True                             # EDIT
    PRINT_BODY_ON_FAIL = False                # EDIT

    r = s.get(
        url(PATH),
        params=PARAMS,
        headers=HEADERS,
        cookies=COOKIES,
        allow_redirects=FOLLOW_REDIRECTS,
        timeout=TIMEOUT,
    )
    body = r.text
    dprint("conditional GET", r.url, r.status_code, "len=", len(body))
    check(r.status_code in EXPECT_STATUS, f"GET bad status {r.status_code}")

    failures = []
    for marker in CONTAINS_ALL:
        if marker not in body:
            failures.append(f"missing marker: {marker}")
    if CONTAINS_ANY and not any(marker in body for marker in CONTAINS_ANY):
        failures.append("none of CONTAINS_ANY found")
    for marker in CONTAINS_NONE:
        if marker in body:
            failures.append(f"blocked marker present: {marker}")
    for marker, needed in MIN_COUNTS.items():
        seen = body.count(marker)
        if seen < needed:
            failures.append(f"{marker!r} count {seen} < {needed}")

    if failures:
        if PRINT_BODY_ON_FAIL:
            print(body[:1500])
        die("; ".join(failures))

    hits = []
    if EXTRACT_REGEX:
        for hit in re.findall(EXTRACT_REGEX, body, flags=re.I | re.S):
            if isinstance(hit, tuple):
                hit = " ".join(str(x) for x in hit if x is not None)
            hit = str(hit).strip()
            if HIT_CONTAINS_ALL and not all(x in hit for x in HIT_CONTAINS_ALL):
                continue
            if HIT_CONTAINS_ANY and not any(x in hit for x in HIT_CONTAINS_ANY):
                continue
            hits.append(hit)
    else:
        hits = [body]

    if UNIQUE:
        hits = list(dict.fromkeys(hits))

    print("[+] conditional GET matched")
    for hit in hits:
        print("[hit]", hit)
    return hits
`

    MULT = 0x5DEECE66D
    ADD = 0xB
    MASK = (1 << 48) - 1

    def __init__(self, seed):
        self.seed = (int(seed) ^ self.MULT) & self.MASK

    def next(self, bits):
        self.seed = (self.seed * self.MULT + self.ADD) & self.MASK
        return self.seed >> (48 - bits)

        check(bound > 0, "bad Java Random bound")

var activeId = "base-main";
var selectedCategory = "All";
var query = "";
var chain = [];
var helpers = new Set();
var stepSeq = 1;
var STORAGE_KEY = "oswe-v4-chain";

function $(sel){ return document.querySelector(sel); }
function escHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}
function piece(id){ return PIECES.find(function(p){ return p.id === id; }); }
function norm(s){ return String(s || "").toLowerCase(); }
function setStatus(msg){ $("#status").textContent = msg || ""; }

function highlighted(code){
  var escaped = escHtml(code);
  escaped = escaped.replace(/^(\s*#.*)$/gm, '<span class="py-cmt">$1</span>');
  escaped = escaped.replace(/\b(def|return|if|else|elif|for|in|while|import|from|as|None|True|False|try|except|with)\b/g, '<span class="py-kw">$1</span>');
  escaped = escaped.replace(/\b(print|len|range|str|int|dict|list|set|globals|isinstance)\b/g, '<span class="py-bi">$1</span>');
  escaped = escaped.replace(/\bdef\s+([A-Za-z_][A-Za-z0-9_]*)/g, 'def <span class="py-fn">$1</span>');
  escaped = escaped.replace(/^(.+?# EDIT.*)$/gm, '<span class="edit">$1</span>');
  return escaped;
}

function searchText(p){
  return norm([p.title,p.category,p.kind,p.chainRole,p.defaultFunction,p.useWhen,(p.editFirst||[]).join(" "),(p.aliases||[]).join(" "),(p.sourceRefs||[]).join(" ")].join(" "));
}

function filteredPieces(){
  return PIECES.filter(function(p){
    if (selectedCategory !== "All" && p.category !== selectedCategory) return false;
    if (query && searchText(p).indexOf(norm(query)) === -1) return false;
    return true;
  });
}

function renderCategories(){
  $("#category-tabs").innerHTML = CATEGORIES.map(function(c){
    return '<button class="tab" data-category="' + escHtml(c) + '" aria-selected="' + String(c === selectedCategory) + '">' + escHtml(c) + '</button>';
  }).join("");
  $("#category-tabs").querySelectorAll("button").forEach(function(btn){
    btn.addEventListener("click", function(){
      selectedCategory = btn.dataset.category;
      render();
    });
  });
}

function renderPresets(){
  $("#preset-select").innerHTML = PRESETS.map(function(p){
    return '<option value="' + escHtml(p.id) + '">' + escHtml(p.title) + '</option>';
  }).join("");
}

function renderList(){
  var rows = filteredPieces();
  $("#result-count").textContent = rows.length + " pecas";
  $("#piece-list").innerHTML = rows.map(function(p){
    return '<button class="piece-row" data-id="' + escHtml(p.id) + '" aria-selected="' + String(p.id === activeId) + '">' +
      '<span class="piece-title">' + escHtml(p.title) + '</span>' +
      '<small>' + escHtml(p.category + " / " + p.kind + " / " + p.chainRole) + '</small>' +
      '<small>' + escHtml(p.useWhen) + '</small>' +
      '</button>';
  }).join("") || '<div class="empty">sem resultados. limpa search ou muda categoria.</div>';
  $("#piece-list").querySelectorAll("button").forEach(function(btn){
    btn.addEventListener("click", function(){
      activeId = btn.dataset.id;
      render();
      setStatus("view " + activeId);
    });
  });
}

function renderActive(){
  var p = piece(activeId) || PIECES[0];
  var edit = (p.editFirst || []).length ? p.editFirst.join(", ") : "none";
  var deps = (p.dependsOn || []).length ? p.dependsOn.join(", ") : "none";
  $("#active-meta").innerHTML =
    '<h3>' + escHtml(p.title) + '</h3>' +
    '<div><span class="badge">' + escHtml(p.category) + '</span> <span class="badge">' + escHtml(p.kind) + '</span> <span class="badge">' + escHtml(p.chainRole) + '</span></div>' +
    '<div class="meta-grid">' +
      '<div class="meta-box"><b>Use when</b>' + escHtml(p.useWhen) + '</div>' +
      '<div class="meta-box"><b>Edit first</b>' + escHtml(edit) + '</div>' +
      '<div class="meta-box"><b>Function</b>' + escHtml(p.defaultFunction || "base/imports") + '</div>' +
      '<div class="meta-box"><b>Depends on</b>' + escHtml(deps) + '</div>' +
    '</div>' +
    '<div class="hint">aliases: ' + escHtml((p.aliases || []).join(", ")) + '</div>';
  $("#piece-code").innerHTML = highlighted(p.code);

  var stepBtn = $("#view-add-step");
  var helperBtn = $("#view-add-helper");
  stepBtn.disabled = p.chainRole === "helper" || p.kind === "start";
  helperBtn.disabled = p.kind === "start" || p.chainRole !== "helper";
  stepBtn.textContent = stepBtn.disabled ? "sem step" : "add step";
  helperBtn.textContent = helpers.has(p.id) || p.kind === "start" ? "helper/base incluido" : "add helper";
}

function addDependencies(p){
  (p.dependsOn || []).forEach(function(id){ helpers.add(id); });
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({chain:chain, helpers:Array.from(helpers), stepSeq:stepSeq}));
  }catch(e){}
}

function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (Array.isArray(data.chain)) chain = data.chain.filter(function(s){ return piece(s.pieceId); });
    if (Array.isArray(data.helpers)) helpers = new Set(data.helpers.filter(function(id){ return piece(id); }));
    if (data.stepSeq) stepSeq = data.stepSeq;
  }catch(e){}
}

function applyPreset(id){
  var preset = PRESETS.find(function(p){ return p.id === id; }) || PRESETS[0];
  chain = [];
  helpers = new Set();
  stepSeq = 1;
  preset.steps.forEach(function(step){
    var p = piece(step[0]);
    if (!p) return;
    addDependencies(p);
    chain.push({stepId:"s" + stepSeq++, pieceId:p.id, label:p.title, functionName:step[1] || p.defaultFunction, enabled:true});
  });
  saveState();
  render();
  setStatus("preset: " + preset.title);
}

function addStep(id){
  var p = piece(id);
  if (!p || p.chainRole === "helper" || p.kind === "start") return;
  addDependencies(p);
  chain.push({stepId:"s" + stepSeq++, pieceId:p.id, label:p.title, functionName:p.defaultFunction, enabled:true});
  saveState();
  render();
  setStatus("step + " + p.defaultFunction);
}

function addHelper(id){
  var p = piece(id);
  if (!p) return;
  helpers.add(p.id);
  addDependencies(p);
  saveState();
  render();
  setStatus("helper + " + p.id);
}

function moveStep(i, delta){
  var j = i + delta;
  if (j < 0 || j >= chain.length) return;
  var tmp = chain[i];
  chain[i] = chain[j];
  chain[j] = tmp;
  saveState();
  render();
}

function removeStep(i){
  chain.splice(i, 1);
  saveState();
  render();
}

function duplicateStep(i){
  var s = chain[i];
  if (!s) return;
  var copy = Object.assign({}, s, {stepId:"s" + stepSeq++, functionName:s.functionName + "_2"});
  chain.splice(i + 1, 0, copy);
  saveState();
  render();
}

function collisions(){
  var seen = {};
  var dup = [];
  chain.filter(function(s){ return s.enabled; }).forEach(function(s){
    if (!s.functionName) return;
    if (seen[s.functionName]) dup.push(s.functionName);
    seen[s.functionName] = true;
  });
  return dup;
}

function renameFunction(code, fromName, toName){
  if (!fromName || !toName || fromName === toName) return code;
  var re = new RegExp("def\\s+" + fromName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*\\(", "m");
  return code.replace(re, "def " + toName + "(");
}

function stepCall(s){
  var p = piece(s.pieceId);
  if (!p) return "";
  if (p.chainRole === "cmd") return s.functionName + '("whoami")  # EDIT command';
  return s.functionName + "()";
}

function includedHelperIds(){
  var ids = new Set(helpers);
  function addDeps(id){
    var p = piece(id);
    if (!p) return;
    (p.dependsOn || []).forEach(function(dep){
      if (!ids.has(dep)) {
        ids.add(dep);
        addDeps(dep);
      }
    });
  }
  Array.from(ids).forEach(addDeps);
  chain.forEach(function(s){
    var p = piece(s.pieceId);
    if (p) (p.dependsOn || []).forEach(function(id){
      ids.add(id);
      addDeps(id);
    });
  });
  return Array.from(ids).filter(function(id){ return id !== "base-main"; });
}

function assembleExploit(){
  var base = piece("base-main").code.trim();
  var parts = [base];
  includedHelperIds().forEach(function(id){
    var p = piece(id);
    if (p) parts.push("# === " + p.title + " ===\n" + p.code.trim());
  });
  chain.forEach(function(s){
    if (!s.enabled) return;
    var p = piece(s.pieceId);
    if (!p) return;
    parts.push("# === " + s.label + " ===\n" + renameFunction(p.code.trim(), p.defaultFunction, s.functionName));
  });
  var calls = chain.filter(function(s){ return s.enabled && s.functionName; }).map(function(s){ return "    " + stepCall(s); });
  if (!calls.length) calls = ["    print('[*] add steps in the builder')"];
  parts.push("def main():\n    args = parse_args()\n    print('[*] target:', TARGET)\n    if LHOST and LPORT:\n        print('[*] callback:', callback_url())\n" + calls.join("\n") + "\n\nif __name__ == \"__main__\":\n    main()\n");
  return parts.join("\n\n");
}

function renderChain(){
  $("#chain-count").textContent = chain.length + " steps";
  $("#chain").innerHTML = chain.length ? chain.map(function(s, i){
    var p = piece(s.pieceId);
    return '<div class="step" data-index="' + i + '">' +
      '<span class="step-num">' + (i + 1) + '</span>' +
      '<div><b>' + escHtml(p ? p.title : s.pieceId) + '</b><br><input data-field="functionName" value="' + escHtml(s.functionName) + '" spellcheck="false"></div>' +
      '<div class="step-actions">' +
        '<button data-action="up">up</button><button data-action="down">down</button><button data-action="toggle">' + (s.enabled ? "on" : "off") + '</button><button data-action="remove">remover</button>' +
        '<button data-action="dup">duplicar</button>' +
      '</div></div>';
  }).join("") : '<div class="empty">chain vazia. procura uma peca e usa add step.</div>';

  $("#chain").querySelectorAll(".step").forEach(function(row){
    var i = Number(row.dataset.index);
    row.querySelector("input").addEventListener("input", function(ev){
      chain[i].functionName = ev.target.value.trim();
      saveState();
      renderGeneratedOnly();
    });
    row.querySelectorAll("button").forEach(function(btn){
      btn.addEventListener("click", function(){
        var a = btn.dataset.action;
        if (a === "up") moveStep(i, -1);
        if (a === "down") moveStep(i, 1);
        if (a === "toggle"){ chain[i].enabled = !chain[i].enabled; saveState(); render(); }
        if (a === "remove") removeStep(i);
        if (a === "dup") duplicateStep(i);
      });
    });
  });
  renderGeneratedOnly();
}

function renderGeneratedOnly(){
  var dup = collisions();
  $("#warnings").innerHTML = dup.length ? '<div class="warning">funcao duplicada: ' + escHtml(dup.join(", ")) + '. renomeia antes de copiar.</div>' : "";
  $("#draft-code").innerHTML = highlighted(assembleExploit());
}

async function copyText(text){
  try{
    if (navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      setStatus("copiado");
      return true;
    }
  }catch(e){}
  var buf = $("#copy-buf");
  buf.value = text;
  buf.focus();
  buf.select();
  try{
    if (document.execCommand("copy")){
      setStatus("copiado");
      return true;
    }
  }catch(e){}
  setStatus("selecionado: press Ctrl+C");
  return false;
}

function editKnobs(p){
  return (p.editFirst || []).map(function(x){ return x + "  # EDIT"; }).join("\n") || "# no EDIT knobs";
}

function render(){
  renderCategories();
  renderList();
  renderActive();
  renderChain();
}

function boot(){
  loadState();
  renderPresets();
  $("#search").addEventListener("input", function(ev){ query = ev.target.value; renderList(); });
  $("#apply-preset").addEventListener("click", function(){ applyPreset($("#preset-select").value); });
  $("#view-add-step").addEventListener("click", function(){ addStep(activeId); });
  $("#view-add-helper").addEventListener("click", function(){ addHelper(activeId); });
  $("#copy-piece").addEventListener("click", function(){ copyText(piece(activeId).code); });
  $("#copy-edit").addEventListener("click", function(){ copyText(editKnobs(piece(activeId))); });
  $("#copy-exploit").addEventListener("click", function(){
    var dup = collisions();
    if (dup.length) setStatus("corrige funcoes duplicadas antes de copiar");
    else copyText(assembleExploit());
  });
  $("#reset-chain").addEventListener("click", function(){ chain = []; helpers = new Set(); saveState(); render(); setStatus("chain limpa"); });
  render();
}

function renderFallback(err){
  var app = $("#app");
  app.className = "fallback";
  app.innerHTML = '<h1>OSWE Exploit.py Builder fallback</h1><p>Boot falhou; lista burra ativa. Erro: ' + escHtml(err && err.message ? err.message : err) + '</p>' +
    PIECES.map(function(p){
      return '<article><h2>' + escHtml(p.title) + '</h2><p>' + escHtml(p.useWhen) + '</p><details class="code-toggle"><summary>codigo</summary><pre>' + escHtml(p.code) + '</pre></details></article>';
    }).join("");
}

try{ boot(); }catch(e){ renderFallback(e); }
</script>
